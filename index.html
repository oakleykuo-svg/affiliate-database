      if (format === 'dot') {
        const parts = dateStr.split('.'); if (parts.length !== 2) return false;
        year = parseInt(parts[0], 10); month = parseInt(parts[1], 10);
      } else {
        const d = new Date(dateStr); if (isNaN(d.getTime())) return false;
        year = d.getFullYear(); month = d.getMonth() + 1;
      }
      const now = new Date();
      return (now.getFullYear() - year) * 12 + ((now.getMonth() + 1) - month) >= 6;
    };

    const formatDate = (isoDateStr) => {
      if (!isoDateStr) return '未知';
      const d = new Date(isoDateStr); if (isNaN(d.getTime())) return '未知';
      return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
    };

    const renderLinks = (text) => {
      if (!text || typeof text !== 'string') return null;
      const urlRegex = /(https?:\/\/[^\s]+)/g;
      return text.split(urlRegex).map((part, i) =>
        urlRegex.test(part)
          ? <a key={i} href={part} target="_blank" rel="noreferrer" className="text-brand hover:underline font-black break-all" onClick={e => e.stopPropagation()}>{part}</a>
          : <span key={i}>{part}</span>
      );
    };

    const FormField = ({ label, hint, hintStyle = 'brand', required, children, colSpan2 = false }) => (
      <div className={`space-y-1.5 ${colSpan2 ? 'md:col-span-2' : ''}`}>
        <label className="text-xs font-bold text-slate-500 uppercase flex items-center gap-2">
          <span>{label}{required && <span className="text-red-500 ml-1">*</span>}</span>
          {hint && <span className={`text-[10px] normal-case tracking-normal ${hintStyle === 'brand' ? 'text-brand bg-brand/10 px-2 py-0.5 rounded-full font-bold' : 'text-slate-400 font-medium'}`}>{hint}</span>}
        </label>
        {children}
      </div>
    );
    const inputCls = "w-full px-4 py-3 bg-white/60 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-brand/30 focus:border-brand transition-all shadow-sm text-sm";

    // ============================================================
    // 🟢 APP ROOT 
    // ============================================================
    function App() {
      // ---------------------------------------------------------
      // 1. 所有 State Hooks 
      // ---------------------------------------------------------
      const [session, setSession] = useState(null);
      const [userRole, setUserRole] = useState(null); 
      const [isCheckingAuth, setIsCheckingAuth] = useState(true);

      const [data, setData] = useState([]);
      const [categories, setCategories] = useState([]);
      const [isLoading, setIsLoading] = useState(true);

      // 搜尋與篩選狀態
      const [searchTerm, setSearchTerm] = useState('');
      const [selectedCategories, setSelectedCategories] = useState([]); 
      const [showAdvancedFilters, setShowAdvancedFilters] = useState(false);
      const [advFilters, setAdvFilters] = useState({ followers:'all', promoPlats:[], tags:[] });
      const [sortBy, setSortBy] = useState('newest'); 
      const [currentPage, setCurrentPage] = useState(1);
      const ITEMS_PER_PAGE = 24;
      
      const [isFormOpen, setIsFormOpen] = useState(false);
      const [editingData, setEditingData] = useState(null);
      const [selectedCreator, setSelectedCreator] = useState(null);
      const [creatorToDelete, setCreatorToDelete] = useState(null);
      
      // 領域分類的下拉選單狀態
      const [showCatFilterDD, setShowCatFilterDD] = useState(false);
      const catFilterRef = useRef(null);

      // 🛒 購物車狀態
      const [selectedIds, setSelectedIds] = useState([]);
      const prevEmailRef = useRef(null);

      // ---------------------------------------------------------
      // 2. 所有 Effect & Memo Hooks
      // ---------------------------------------------------------
      useEffect(() => {
        if (!isRealMode) {
          setSession({ user: { email: 'mock_user@example.com', user_metadata: { full_name: 'Mock Admin' } } });
          setUserRole('admin');
          setIsCheckingAuth(false);
          return;
        }

        const checkUserRole = async (email, silent = false) => {
          if (!silent) setIsCheckingAuth(true);
          try {
            const { data, error } = await supabase.from('allowed_users').select('role').eq('email', email).single();
            if (error || !data) setUserRole('unauthorized');
            else setUserRole(data.role);
          } catch (err) {
            console.error("Role fetch error:", err);
            setUserRole('unauthorized');
          } finally {
            if (!silent) setIsCheckingAuth(false);
          }
        };

        supabase.auth.getSession().then(({ data: { session } }) => {
          setSession(session);
          if (session?.user?.email) {
            prevEmailRef.current = session.user.email;
            checkUserRole(session.user.email, false); 
          } else {
            setIsCheckingAuth(false);
          }
        });

        const { data: { subscription } } = supabase.auth.onAuthStateChange((event, newSession) => {
          setSession(newSession);
          if (newSession?.user?.email) {
            const currentEmail = newSession.user.email;
            const isSameUser = prevEmailRef.current === currentEmail;
            prevEmailRef.current = currentEmail;
            checkUserRole(currentEmail, isSameUser);
          } else {
            prevEmailRef.current = null;
            setUserRole(null); 
            setIsCheckingAuth(false); 
          }
        });

        return () => subscription.unsubscribe();
      }, []);

      useEffect(() => {
        if (isCheckingAuth) return;
        if (session && userRole && userRole !== 'unauthorized') {
          fetchData();
        }
      }, [session, userRole, isCheckingAuth]);

      useEffect(() => { 
        setCurrentPage(1); 
      }, [searchTerm, selectedCategories, advFilters, sortBy]);

      // 點擊外部關閉 Categories 下拉選單
      useEffect(() => {
        const handleClickOutside = e => {
          if (catFilterRef.current && !catFilterRef.current.contains(e.target)) setShowCatFilterDD(false);
        };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      const safeData = Array.isArray(data) ? data : [];
      const filteredData = useMemo(() => {
        return safeData.filter(item => {
          if (!item) return false;
          
          // 關鍵字搜尋
          const s = searchTerm.trim().toLowerCase();
          if (s) {
            const terms = s.split(/\s+/);
            const itemText = [
              item.name, item.user_id, item.instagram_url, 
              item.category, item.collaboration_tags, item.notes, item.extra_platforms
            ].join(' ').toLowerCase();
            const matchSearch = terms.some(term => itemText.includes(term));
            if (!matchSearch) return false;
          }

          // Category 複選邏輯 (OR 聯集)
          if (selectedCategories.length > 0) {
            const itemCats = parseTags(item.category);
            const hasCatMatch = selectedCategories.some(c => itemCats.includes(c));
            if (!hasCatMatch) return false;
          }
          
          const f = parseInt(String(item.followers||'0').replace(/,/g,''),10) || 0;
          if (advFilters.followers === 'nano' && f >= 10000) return false;
          if (advFilters.followers === 'micro' && (f < 10000 || f >= 50000)) return false;
          if (advFilters.followers === 'macro' && (f < 50000 || f >= 150000)) return false;
          if (advFilters.followers === 'mega' && (f < 150000 || f >= 300000)) return false;
          if (advFilters.followers === 'toptier' && f < 300000) return false;
          
          if (advFilters.promoPlats.length > 0) {
            const itemPlats = parseTags(item.promo_platforms);
            const hasPlatMatch = advFilters.promoPlats.some(p => itemPlats.includes(p));
            if (!hasPlatMatch) return false;
          }
          
          if (advFilters.tags.length > 0) {
            const itemTags = parseTags(item.collaboration_tags);
            const hasMatch = advFilters.tags.some(t => itemTags.includes(t));
            if (!hasMatch) return false;
          }

          return true;
        }).sort((a, b) => {
          if (sortBy === 'newest') return (b.id || 0) - (a.id || 0);
          if (sortBy === 'oldest') return (a.id || 0) - (b.id || 0);
          const toNum = x => parseInt(String(x.followers||'0').replace(/,/g,''),10) || 0;
          if (sortBy === 'followers_desc') return toNum(b) - toNum(a);
          if (sortBy === 'followers_asc') return toNum(a) - toNum(b);
          if (sortBy === 'quote_new') return (b.quote_updated_date||'').localeCompare(a.quote_updated_date||'');
          return 0;
        });
      }, [safeData, searchTerm, selectedCategories, advFilters, sortBy]);

      const displayedData = useMemo(() => filteredData.slice((currentPage-1)*ITEMS_PER_PAGE, currentPage*ITEMS_PER_PAGE), [filteredData, currentPage]);
      const totalPages = Math.ceil(filteredData.length / ITEMS_PER_PAGE);

      // ---------------------------------------------------------
      // 3. 一般函數 (Function) 
      // ---------------------------------------------------------
      const fetchData = async () => {
        setIsLoading(true);
        if (!isRealMode) {
          // Mock
        } else {
          try {
            const [{ data: inf, error }, { data: cats }] = await Promise.all([
              supabase.from('influencers').select('*').limit(5000),
              supabase.from('categories').select('*').order('id', { ascending: true })
            ]);
            if (error) console.error(error);
            setData(Array.isArray(inf) ? inf : []);
            setCategories(Array.isArray(cats) ? cats : []);
          } catch (err) { console.error(err); }
        }
        setIsLoading(false);
      };

      const handleLogin = async () => {
        const { error } = await supabase.auth.signInWithOAuth({ provider: 'google' });
        if (error) alert(`登入失敗: ${error.message}`);
      };

      const handleLogout = async () => { await supabase.auth.signOut(); };

      const handleSaveCreator = async (newCreator, isEditMode, originalId) => {
        if (userRole === 'viewer') return alert('權限不足：您只能瀏覽資料。');

        const final = { ...newCreator, last_updated_date: new Date().toISOString() };
        if (!isRealMode) {
          if (isEditMode) setData(data.map(d => d.id === originalId ? { ...final, id: originalId } : d));
          else { final.id = Math.max(...data.map(d => d.id || 0), 0) + 1; setData([final, ...data]); }
          closeForm();
        } else {
          try {
            if (isEditMode) {
              if (!originalId) throw new Error('缺少 ID，無法更新。');
              delete final.id;
              const { data: updated, error } = await supabase.from('influencers').update(final).eq('id', originalId).select();
              if (error) throw error;
              if (updated && updated.length > 0) {
                setData(data.map(d => d.id === originalId ? updated[0] : d));
                closeForm();
              } else throw new Error('更新失敗：可能無此權限或找不到資料');
            } else {
              delete final.id;
              const { data: inserted, error } = await supabase.from('influencers').insert([final]).select();
              if (error) throw error;
              if (inserted && inserted.length > 0) {
                setData([inserted[0], ...data]);
                closeForm();
              } else throw new Error('新增失敗：無回傳資料，可能被 RLS 權限阻擋');
            }
          } catch (err) {
            console.error('Supabase DB Error:', err);
            alert(`🚨 資料庫存取失敗！\n\n錯誤訊息：${err.message || JSON.stringify(err)}\n\n💡 請檢查 Supabase 欄位名稱或型態是否正確。`);
            throw err; 
          }
        }
      };

      const handleDeleteCreator = async (creator) => {
        if (userRole !== 'admin') return alert('權限不足：只有管理員能刪除資料。');
        if (!isRealMode) {
          setData(data.filter(d => d.id !== creator.id));
          setCreatorToDelete(null); setSelectedCreator(null);
        } else {
          try {
            if (!creator.id) throw new Error('缺少 id Primary Key');
            const { error } = await supabase.from('influencers').delete().eq('id', creator.id);
            if (error) throw error;
            setData(data.filter(d => d.id !== creator.id)); 
            setCreatorToDelete(null); setSelectedCreator(null);
          } catch (err) {
            alert(`🚨 刪除失敗！\n錯誤訊息：${err.message || '未知錯誤'}`);
            throw err;
          }
        }
      };

      const openCreateForm = () => { setEditingData(null); setIsFormOpen(true); };
      const openEditForm = (creator) => { setSelectedCreator(null); setEditingData(creator); setIsFormOpen(true); };
      const closeForm = () => { setIsFormOpen(false); setEditingData(null); };

      // 🏠 重新設定所有條件
      const handleResetAll = () => {
        setSearchTerm('');
        setSelectedCategories([]);
        setAdvFilters({ followers:'all', promoPlats:[], tags:[] });
        setSortBy('newest');
        setCurrentPage(1);
        setShowAdvancedFilters(false);
        document.getElementById('scroll-container')?.scrollTo({top: 0, behavior: 'smooth'});
      };

      // 🛒 購物車切換邏輯
      const toggleSelection = (id, e) => {
        e.stopPropagation(); 
        setSelectedIds(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]);
      };

      // 📦 匯出功能
      const handleExportCSV = () => {
        // ✅ 嚴格防護：防堵 viewer 匯出
        if (!['admin', 'editor'].includes(userRole)) {
          alert('權限不足：只有管理員和編輯者能匯出資料。');
          return;
        }

        const dataToExport = selectedIds.length > 0 
          ? safeData.filter(d => selectedIds.includes(d.id)) 
          : filteredData;

        if (dataToExport.length === 0) {
          alert('目前沒有資料可供匯出！');
          return;
        }

        const headers = ['網紅姓名', '最高粉絲數', 'Email', 'Instagram', 'YouTube', 'Facebook', '其他社群連結', '額外曝光管道與說明', '合作模式 Tags', '固定開團平台', '保底費用 / 預計分潤', '備註'];
        const escapeCSV = (str) => {
          if (str === null || str === undefined) return '""';
          return `"${String(str).replace(/"/g, '""')}"`;
        };

        const rows = dataToExport.map(d => {
          const parsedSocials = parseOtherSocials(d.other_social_platforms);
          const otherLinks = [];
          Object.entries(parsedSocials).forEach(([k, v]) => {
            if (v && k !== 'YouTube' && k !== 'Facebook') otherLinks.push(`${k}: ${v}`);
          });

          return [
            escapeCSV(d.name), escapeCSV(d.followers), escapeCSV(d.email), escapeCSV(d.instagram_url), escapeCSV(d.youtube_url),
            escapeCSV(d.facebook_url), escapeCSV(otherLinks.join('\n')), escapeCSV(d.extra_platforms), escapeCSV(d.collaboration_tags),
            escapeCSV(d.promo_platforms), escapeCSV(`保底: ${d.base_fee || '無'} / 分潤: ${d.commission_rate || '無'}`), escapeCSV(d.notes)
          ].join(',');
        });

        const csvContent = '\uFEFF' + [headers.join(','), ...rows].join('\n');
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.setAttribute('download', `Affiliate_Database_Export_${new Date().toISOString().slice(0,10)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      // 🎓 新手導覽動畫 (Driver.js) - 主畫面
      const startTour = () => {
        if (!window.driver) return alert('載入導覽套件失敗，請稍後重試。');
        
        const steps = [
          { element: '#tour-logo', popover: { title: '1. 回到首頁', description: '點擊 LOGO 可以隨時清除所有搜尋與篩選條件，回到最乾淨的初始畫面。', side: "bottom", align: 'start' }},
          { element: '#tour-search', popover: { title: '2. 快速搜尋', description: '直接輸入網紅姓名、IG帳號、標籤或備註來尋找人選。', side: "bottom", align: 'start' }},
          { element: '#tour-advanced', popover: { title: '3. 進階篩選與領域', description: '點擊展開篩選面板，現在可以「跨領域複選」類別、開團平台等條件了！', side: "bottom", align: 'start' }}
        ];

        // ✅ 只有編輯權限以上的人，才會在導覽中看到匯出與新增的步驟
        if (['admin', 'editor'].includes(userRole)) {
          steps.push({ element: '#tour-export', popover: { title: '4. 匯出與購物車', description: '勾選下方網紅卡片左上角的「＋」號加入購物車，這顆按鈕就會自動變身，讓你精準匯出名單。', side: "bottom", align: 'start' }});
          steps.push({ element: '#tour-add', popover: { title: '5. 新增網紅', description: '隨時把最新發現的網紅建檔，豐富你們的專屬資料庫吧！', side: "bottom", align: 'start' }});
        }

        const driverObj = window.driver.js.driver({
          showProgress: true,
          nextBtnText: '下一步',
          prevBtnText: '上一步',
          doneBtnText: '完成教學',
          steps: steps
        });
        driverObj.drive();
      };

      // ---------------------------------------------------------
      // 4. 🚀 提早退場區塊
      // ---------------------------------------------------------
      if (isCheckingAuth) {
        return (
          <div className="min-h-screen login-bg flex items-center justify-center">
            <div className="bg-white/90 backdrop-blur-xl p-8 rounded-3xl shadow-2xl flex flex-col items-center">
              <span className="relative flex h-6 w-6 mb-4">
                <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-brand/50 opacity-75"></span>
                <span className="relative inline-flex rounded-full h-6 w-6 bg-brand"></span>
              </span>
              <p className="text-slate-600 font-bold tracking-widest text-sm">驗證身分中...</p>
            </div>
          </div>
        );
      }

      if (!session) {
        return (
          <div className="min-h-screen login-bg flex flex-col items-center justify-center p-4">
            <div className="bg-white/90 backdrop-blur-2xl p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-white/50 animate-zoom-in text-center">
              <div className="w-16 h-16 bg-gradient-to-br from-brand to-[#c75551] rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-lg">
                <Icon name="sliders" size={32} className="text-white" />
              </div>
              <h1 className="text-3xl font-black text-slate-800 mb-2 tracking-tight">Affiliate <span className="grad-brand">Database</span></h1>
              <p className="text-sm font-semibold text-slate-500 mb-10">請使用 Google 企業帳號登入系統</p>
              <button onClick={handleLogin} className="w-full flex items-center justify-center gap-3 bg-white border border-slate-200 text-slate-700 py-3.5 px-6 rounded-2xl text-sm font-bold shadow-sm hover:bg-slate-50 hover:shadow-md transition-all active:scale-95">
                <IconGoogle /> <span>使用 Google 帳號登入</span>
              </button>
              <div className="mt-8 text-[11px] text-slate-400 font-bold uppercase tracking-widest">CONFIDENTIAL · INTERNAL USE ONLY</div>
            </div>
          </div>
        );
      }

      if (userRole === 'unauthorized') {
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4">
            <div className="bg-white p-10 rounded-[2rem] shadow-xl w-full max-w-md border border-slate-100 text-center animate-zoom-in">
              <div className="w-16 h-16 bg-red-50 rounded-full mx-auto mb-6 flex items-center justify-center border border-red-100"><Icon name="shield" size={28} className="text-red-500" strokeWidth={1.5} /></div>
              <h2 className="text-2xl font-black text-slate-800 mb-3">沒有存取權限</h2>
              <p className="text-sm text-slate-500 mb-8 leading-relaxed">您的信箱 <strong>{session.user.email}</strong> 不在系統白名單內。<br/>請聯絡管理員為您開啟權限。</p>
              <button onClick={handleLogout} className="px-8 py-3 bg-slate-800 text-white rounded-xl text-sm font-bold hover:bg-slate-700 transition-colors shadow-md">切換帳號或登出</button>
            </div>
          </div>
        );
      }

      // ---------------------------------------------------------
      // 5. 畫面渲染區塊 
      // ---------------------------------------------------------
      return (
        <div className="min-h-screen flex font-sans">
          {/* ── MAIN (全寬無側邊欄) ────────────────────────────────────────── */}
          <main className="flex-1 flex flex-col min-h-screen overflow-hidden relative">
            
            {/* 總資料數浮動標籤 (右下角) */}
            <div className="fixed bottom-6 right-6 text-[11px] font-bold text-slate-500 bg-white/80 backdrop-blur-xl px-4 py-2.5 rounded-full border border-slate-200 shadow-glass pointer-events-none z-40 flex items-center gap-2 animate-fade-in">
              <span className="relative flex h-2 w-2">
                <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-brand/50 opacity-75"></span>
                <span className="relative inline-flex rounded-full h-2 w-2 bg-brand"></span>
              </span>
              資料庫總計: <span className="text-slate-800 font-black text-xs">{data.length}</span> 筆
            </div>

            <header className="bg-white/80 backdrop-blur-xl border-b border-slate-100 px-4 lg:px-6 py-3 lg:py-4 flex flex-col lg:flex-row items-center justify-between sticky top-0 z-50 shadow-[0_1px_20px_rgba(0,0,0,0.04)] gap-4">
              
              {/* 🏠 LOGO 與 回首頁 */}
              <div className="w-full lg:w-auto flex items-center justify-between shrink-0">
                <div className="cursor-pointer group flex items-center" onClick={handleResetAll} title="回到首頁並清除所有條件" id="tour-logo">
                  <h1 className="text-[22px] lg:text-2xl font-black tracking-tight leading-none group-hover:opacity-80 transition-opacity">
                    <span className="grad-hero">Affiliate</span>
                    <span className="text-slate-700 text-base lg:text-lg font-bold ml-1.5 tracking-normal">Database TW</span>
                  </h1>
                </div>
              </div>

              {/* 🔍 搜尋與篩選 */}
              <div className="flex items-center w-full lg:max-w-xl xl:max-w-2xl gap-3 flex-1" id="tour-search">
                <div className="relative flex-1">
                  <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"><Icon name="search" size={17} /></div>
                  <input type="text" placeholder="搜尋網紅姓名或 @帳號..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full pl-11 pr-4 py-3 bg-white border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-brand/25 focus:border-brand/50 shadow-sm text-sm transition-all" />
                </div>
                <select value={sortBy} onChange={e => setSortBy(e.target.value)} className="p-3 bg-white border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-brand/25 shadow-sm text-sm text-slate-600 font-bold cursor-pointer hidden md:block">
                  <option value="newest">加入時間：新 → 舊</option><option value="oldest">加入時間：舊 → 新</option><option value="followers_desc">粉絲：高 → 低</option><option value="followers_asc">粉絲：低 → 高</option>
                </select>
                <button id="tour-advanced" onClick={() => setShowAdvancedFilters(!showAdvancedFilters)} className={`p-3 rounded-xl transition-all border shrink-0 ${showAdvancedFilters ? 'bg-brand text-white border-brand shadow-glow' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50 shadow-sm'}`}>
                  <Icon name="sliders" size={16} />
                </button>
              </div>

              {/* ⚙️ 操作按鈕區 */}
              <div className="flex items-center gap-2 lg:gap-3 w-full lg:w-auto overflow-x-auto pb-1 lg:pb-0 shrink-0">
                {/* 🎓 導覽按鈕 */}
                <button onClick={startTour} className="shrink-0 flex items-center justify-center gap-1.5 text-slate-500 bg-slate-50 border border-slate-200 px-3 py-2.5 rounded-xl text-xs font-bold transition-all hover:bg-white hover:text-brand hover:border-brand/30 shadow-sm" title="操作導覽">
                  <Icon name="help" size={15} /> <span className="hidden lg:inline">導覽</span>
                </button>

                {/* 🛒 購物車匯出按鈕切換 (僅限有權限者) */}
                {['admin', 'editor'].includes(userRole) && (
                  <div id="tour-export">
                    {selectedIds.length > 0 ? (
                      <div className="flex items-center gap-1.5 bg-brand/10 p-1 pl-1.5 rounded-2xl border border-brand/20 animate-fade-in shrink-0">
                        <button onClick={handleExportCSV} className="flex items-center gap-2 text-white bg-brand px-4 py-1.5 rounded-xl text-sm font-bold shadow-sm hover:bg-red-600 transition-all"><Icon name="download" size={16} /> 匯出已選 ({selectedIds.length})</button>
                        <button onClick={() => setSelectedIds([])} className="px-3 py-1.5 text-xs font-bold text-brand hover:bg-brand/20 rounded-xl transition-all" title="清除選取">清除</button>
                      </div>
                    ) : (
                      <button onClick={handleExportCSV} className="shrink-0 flex items-center justify-center gap-2 text-slate-600 bg-white border border-slate-200 px-4 py-2.5 rounded-2xl text-sm font-bold transition-all hover:bg-slate-50 hover:text-brand hover:border-brand/30 shadow-sm"><Icon name="download" size={16} /> <span className="hidden lg:inline">匯出</span></button>
                    )}
                  </div>
                )}

                {/* 新增網紅按鈕 (僅限有權限者) */}
                {['admin', 'editor'].includes(userRole) && (
                  <div id="tour-add">
                    <button onClick={openCreateForm} className="shrink-0 flex items-center justify-center gap-2 text-white px-5 py-2.5 rounded-2xl text-sm font-black transition-all shadow-glow hover:shadow-lg hover:-translate-y-0.5" style={{ background: 'linear-gradient(135deg, #E14f4b 0%, #f0857f 50%, #c75551 100%)' }}>
                      <Icon name="plus" size={16} /> <span className="hidden sm:inline">新增網紅</span>
                    </button>
                  </div>
                )}

                <div className="flex items-center gap-2 pl-3 ml-1 border-l border-slate-200 shrink-0">
                  <div className="text-right hidden xl:block">
                    <div className="text-xs font-black text-slate-700 truncate max-w-[100px]">{session?.user?.user_metadata?.full_name || (session?.user?.email ? session.user.email.split('@')[0] : 'User')}</div>
                    <div className={`text-[9px] font-black uppercase tracking-widest ${userRole === 'admin' ? 'text-brand' : userRole === 'editor' ? 'text-sky-500' : 'text-slate-400'}`}>{userRole}</div>
                  </div>
                  <button onClick={handleLogout} className="p-2.5 bg-slate-50 border border-slate-200 hover:bg-slate-100 hover:text-red-500 text-slate-500 rounded-xl transition-all shadow-sm" title="登出系統"><Icon name="logout" size={16} /></button>
                </div>
              </div>
            </header>

            {showAdvancedFilters && (
              <div className="relative bg-white/90 backdrop-blur-xl border-b border-slate-100 px-6 py-5 shadow-sm z-40 animate-slide-down">
                <div className="max-w-6xl flex flex-col gap-6">
                  {/* 第一排：領域與平台 */}
                  <div className="flex flex-col lg:flex-row gap-6">
                    <div className="space-y-2 w-full lg:w-64 shrink-0 z-20">
                      <label className="text-[10px] font-black text-slate-400 uppercase tracking-[0.12em]">領域類別 Categories</label>
                      <div ref={catFilterRef} className="relative pt-1.5">
                        <div onClick={() => setShowCatFilterDD(!showCatFilterDD)} className="w-full bg-white border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none hover:border-brand/30 font-bold cursor-pointer flex justify-between items-center shadow-sm transition-colors">
                          <span className={selectedCategories.length > 0 ? "text-brand" : "text-slate-500"}>
                            {selectedCategories.length > 0 ? `已選 ${selectedCategories.length} 個領域` : '全部領域 All'}
                          </span>
                          <Icon name={showCatFilterDD ? 'chevup' : 'chevdown'} size={16} className="text-slate-400" />
                        </div>
                        {showCatFilterDD && (
                          <div className="absolute z-30 mt-2 w-72 bg-white border border-slate-100 shadow-xl rounded-2xl p-3 grid grid-cols-2 gap-2 animate-slide-down max-h-64 overflow-y-auto thin-scrollbar">
                            {categories.map(cat => {
                              const checked = selectedCategories.includes(cat.name);
                              return (
                                <label key={cat.id} className={`flex items-center gap-2 text-xs font-bold cursor-pointer p-2 rounded-xl transition-all ${checked ? 'bg-brand/10 text-brand' : 'text-slate-600 hover:bg-slate-50'}`}>
                                  <input type="checkbox" className="hidden" checked={checked} onChange={e => {
                                    if (e.target.checked) setSelectedCategories([...selectedCategories, cat.name]);
                                    else setSelectedCategories(selectedCategories.filter(c => c !== cat.name));
                                  }} />
                                  <div className={`w-3.5 h-3.5 rounded border flex items-center justify-center shrink-0 ${checked ? 'border-brand bg-brand text-white' : 'border-slate-300'}`}>
                                    {checked && <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>}
                                  </div>
                                  <span className="truncate">{cat.name}</span>
                                </label>
                              )
                            })}
                          </div>
                        )}
                      </div>
                    </div>
                    
                    <div className="space-y-2 w-full lg:w-auto shrink-0">
                      <label className="text-[10px] font-black text-slate-400 uppercase tracking-[0.12em]">開團平台</label>
                      <div className="flex flex-wrap gap-2 pt-1.5">
                        {PROMO_PLATFORM_OPTIONS.map(plat => (
                          <label key={plat} className={`flex items-center gap-1.5 cursor-pointer text-xs font-semibold px-3 py-2 rounded-xl border transition-all ${advFilters.promoPlats.includes(plat) ? 'bg-brand/10 border-brand text-brand shadow-sm' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50'}`}>
                            <input type="checkbox" className="hidden" checked={advFilters.promoPlats.includes(plat)} onChange={e => {
                              const newPlats = e.target.checked ? [...advFilters.promoPlats, plat] : advFilters.promoPlats.filter(t => t !== plat);
                              setAdvFilters({...advFilters, promoPlats: newPlats});
                            }} />{plat}
                          </label>
                        ))}
                      </div>
                    </div>
                  </div>

                  {/* 第二排：粉絲數與 Tags */}
                  <div className="flex flex-col lg:flex-row gap-6 items-start">
                    <div className="space-y-2 w-full lg:w-64 shrink-0">
                      <label className="text-[10px] font-black text-slate-400 uppercase tracking-[0.12em]">粉絲數級別</label>
                      <div className="pt-1.5">
                        <select value={advFilters.followers} onChange={e => setAdvFilters({...advFilters, followers:e.target.value})} className="w-full bg-white border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand/25 font-bold text-slate-600 shadow-sm">
                          <option value="all">不限</option><option value="nano">Nano (&lt; 10k)</option><option value="micro">Micro (10k–50k)</option><option value="macro">Macro (50k–150k)</option><option value="mega">Mega (150k–300k)</option><option value="toptier">Top Tier (&gt; 300k)</option>
                        </select>
                      </div>
                    </div>

                    <div className="space-y-2 flex-1 min-w-0">
                      <label className="text-[10px] font-black text-slate-400 uppercase tracking-[0.12em]">合作模式 Tags</label>
                      <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 pt-1.5">
                        <div className="flex flex-wrap gap-2">
                          {COLLAB_OPTIONS.map(tag => (
                            <label key={tag} className={`flex items-center gap-1.5 cursor-pointer text-xs font-semibold px-3 py-2 rounded-xl border transition-all ${advFilters.tags.includes(tag) ? 'bg-brand/10 border-brand text-brand shadow-sm' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50'}`}>
                              <input type="checkbox" className="hidden" checked={advFilters.tags.includes(tag)} onChange={e => {
                                const newTags = e.target.checked ? [...advFilters.tags, tag] : advFilters.tags.filter(t => t !== tag);
                                setAdvFilters({...advFilters, tags: newTags});
                              }} />{tag}
                            </label>
                          ))}
                        </div>
                        {/* 🧹 重設全部條件按鈕 */}
                        <button onClick={handleResetAll} className="flex items-center gap-1.5 px-4 py-2 text-xs font-bold text-slate-500 hover:text-brand bg-slate-50 hover:bg-brand/5 rounded-xl transition-all whitespace-nowrap shrink-0 border border-slate-100 hover:border-brand/20 shadow-sm">
                          <Icon name="refresh" size={14} /> 重設全部條件
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            <div id="scroll-container" className="p-6 md:p-8 overflow-y-auto flex-1 no-scrollbar pb-24">
              {isLoading ? (
                <div className="flex items-center justify-center h-64 text-slate-400 font-medium flex-col gap-3"><span className="relative flex h-4 w-4"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-brand/50 opacity-75"></span><span className="relative inline-flex rounded-full h-4 w-4 bg-brand"></span></span>資料讀取中...</div>
              ) : (
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-5">
                  {/* ✅ 將 userRole 傳遞進 CreatorCard 以判斷是否顯示選取按鈕 */}
                  {displayedData.map(creator => (
                    <CreatorCard key={creator.id} data={creator} userRole={userRole} onClick={() => setSelectedCreator(creator)} isSelected={selectedIds.includes(creator.id)} onToggleSelect={(e) => toggleSelection(creator.id, e)} />
                  ))}

                  {filteredData.length > 0 && (
                    <div className="col-span-full flex justify-center items-center gap-4 py-8">
                      <button onClick={() => { setCurrentPage(p => Math.max(1,p-1)); document.getElementById('scroll-container').scrollTo({top:0,behavior:'smooth'}); }} disabled={currentPage===1} className="px-5 py-2.5 bg-white border border-slate-200 rounded-xl text-slate-600 font-bold hover:bg-slate-50 hover:text-brand disabled:opacity-40 transition-all shadow-sm text-sm">上一頁</button>
                      
                      {/* ✅ 升級：中間的頁面資訊變成「下拉式跳轉選單」 */}
                      <div className="text-slate-500 font-medium text-sm bg-white px-4 py-2 rounded-xl border border-slate-100 shadow-sm flex items-center gap-2">
                        第 
                        <select 
                          value={currentPage} 
                          onChange={(e) => { 
                            setCurrentPage(Number(e.target.value)); 
                            document.getElementById('scroll-container').scrollTo({top:0,behavior:'smooth'}); 
                          }}
                          className="bg-brand/5 border border-brand/20 text-brand font-black pl-3 pr-2 py-1 rounded-lg cursor-pointer hover:bg-brand/10 transition-all outline-none focus:ring-2 focus:ring-brand/30"
                        >
                          {Array.from({ length: totalPages }, (_, i) => i + 1).map(p => (
                            <option key={p} value={p}>{p}</option>
                          ))}
                        </select>
                        頁，共 {totalPages} 頁
                        <span className="text-slate-400 ml-1.5 hidden sm:inline">/ {filteredData.length} 筆</span>
                      </div>

                      <button onClick={() => { setCurrentPage(p => Math.min(totalPages,p+1)); document.getElementById('scroll-container').scrollTo({top:0,behavior:'smooth'}); }} disabled={currentPage===totalPages} className="px-5 py-2.5 bg-white border border-slate-200 rounded-xl text-slate-600 font-bold hover:bg-slate-50 hover:text-brand disabled:opacity-40 transition-all shadow-sm text-sm">下一頁</button>
                    </div>
                  )}
                  {filteredData.length === 0 && <div className="col-span-full text-center py-24 text-slate-400 font-medium">找不到符合條件的網紅資料 🥲</div>}
                </div>
              )}
            </div>
          </main>

          {isFormOpen && <FormModal existingData={data} categories={categories} initialData={editingData} onClose={closeForm} onSave={handleSaveCreator} />}
          {selectedCreator && <DetailModal data={selectedCreator} userRole={userRole} onClose={() => setSelectedCreator(null)} onEdit={() => openEditForm(selectedCreator)} onDelete={() => { setSelectedCreator(null); setCreatorToDelete(selectedCreator); }} />}
          {creatorToDelete && <ConfirmDeleteModal data={creatorToDelete} onClose={() => setCreatorToDelete(null)} onConfirm={handleDeleteCreator} />}
        </div>
      );
    }

    // ============================================================
    // 🃏 CREATOR CARD
    // ============================================================
    function CreatorCard({ data, userRole, onClick, isSelected, onToggleSelect }) {
      const tier = getTierInfo(data.followers);
      const collabTags = parseTags(data.collaboration_tags);
      const promoPlats = parseTags(data.promo_platforms);
      const quoteOutdated = isOlderThan6Months(data.quote_updated_date, 'dot');
      const profileOutdated = isOlderThan6Months(data.last_updated_date, 'iso');
      const lastUpdatedText = formatDate(data.last_updated_date);
      const displaySocialsObj = mergeDisplaySocials(data);

      return (
        <div onClick={onClick} className={`bg-white/80 backdrop-blur-xl border ${isSelected ? 'border-brand shadow-[0_0_0_2px_rgba(225,79,75,0.2)]' : 'border-slate-100 hover:border-brand/20 hover:shadow-[0_16px_48px_rgba(225,79,75,0.10)]'} hover:-translate-y-1.5 transition-all duration-300 rounded-[1.5rem] cursor-pointer flex flex-col p-4 relative group animate-fade-in`}>
          
          <div className="absolute inset-0 rounded-[1.5rem] overflow-hidden pointer-events-none z-10">
            <div className="absolute top-0 left-[-100%] w-[60%] h-full bg-gradient-to-r from-transparent via-white/50 to-transparent group-hover:left-[150%] transition-all duration-500 ease-in-out"></div>
          </div>

          {/* 🛒 僅管理員/編輯者可見的選取按鈕 (Viewer 無法看到，確保無法使用購物車) */}
          {['admin', 'editor'].includes(userRole) && (
            <div onClick={onToggleSelect} className="absolute top-[-8px] left-[-8px] z-30 p-1.5 rounded-full hover:scale-110 transition-transform cursor-pointer group/check">
              <div className={`w-7 h-7 rounded-full flex items-center justify-center transition-all shadow-sm backdrop-blur-md ${isSelected ? 'bg-brand text-white shadow-brand/30 border border-brand' : 'bg-white/70 border border-white/60 text-slate-500 group-hover/check:bg-white group-hover/check:text-brand group-hover/check:border-brand/30 group-hover/check:shadow-md'}`}>
                {isSelected 
                  ? <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                  : <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                }
              </div>
            </div>
          )}

          <div className="absolute top-4 right-4 z-20 group/tip cursor-help">
            <span className="relative flex h-3 w-3">
              {profileOutdated && <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-amber-400 opacity-75"></span>}
              <span className={`relative inline-flex rounded-full h-3 w-3 border-2 border-white shadow-sm ${profileOutdated ? 'bg-amber-500' : 'bg-emerald-400'}`}></span>
            </span>
            <div className="absolute right-0 top-5 w-max max-w-[200px] p-2 bg-slate-900 text-white text-[10px] rounded-lg opacity-0 group-hover/tip:opacity-100 transition-opacity pointer-events-none shadow-xl z-30 font-medium leading-relaxed">
              {profileOutdated ? `⚠️ 粉絲數最後更新：${lastUpdatedText}，可能過期` : `✅ 粉絲數最後更新：${lastUpdatedText}`}
            </div>
          </div>

          <div className="flex items-center gap-3 mb-4">
            <div className="w-12 h-12 rounded-[14px] shrink-0 overflow-hidden border-2 border-white shadow-[0_4px_12px_rgba(225,79,75,0.2)]" style={{ background: 'linear-gradient(135deg, #E14f4b 0%, #c75551 100%)' }}>
              {data?.avatar_url
                ? <img src={data.avatar_url} alt={data.name} className="w-full h-full object-cover" />
                : <div className="w-full h-full flex items-center justify-center text-white font-black text-lg">{getInitials(data?.name)}</div>}
            </div>
            <div className="flex-1 min-w-0 pr-6">
              <h2 className="text-sm font-black truncate text-slate-800 group-hover:grad-brand transition-colors">{data?.name}</h2>
              <div className="flex flex-wrap items-center gap-1.5 mt-1.5">
                <span className={`px-2 py-0.5 rounded-md text-[9px] font-black uppercase tracking-widest border ${tier.color}`}>{tier.label}</span>
                <div className="flex items-center gap-1 bg-slate-50 px-2 py-0.5 rounded-md border border-slate-200 group/foll relative cursor-help hover:border-slate-300 transition-colors">
                  <span className="text-[9px] font-bold text-slate-400">最高粉絲數</span><span className="text-[10px] font-black text-slate-700">{formatFollowers(data?.followers)}</span><Icon name="info" size={10} className="text-slate-400" />
                  <div className="absolute left-1/2 -translate-x-1/2 bottom-full mb-2 w-max max-w-[220px] p-2.5 bg-slate-900 text-white text-[10px] rounded-lg opacity-0 group-hover/foll:opacity-100 transition-opacity pointer-events-none shadow-xl z-30 font-medium leading-relaxed text-center">
                    💡 此為建檔/更新時的靜態數據，最新粉絲數請點擊網紅社群連結確認。
                  </div>
                </div>
                {data?.user_id && <span className="text-[11px] text-slate-400 truncate font-medium ml-1">@{data.user_id}</span>}
              </div>
            </div>
          </div>

          <div className="flex gap-2 mb-3">
            <div className="bg-slate-50/80 w-full rounded-2xl p-2 border border-slate-100 flex flex-col justify-between">
              <div className="flex justify-evenly px-1 mb-1 mt-0.5">
                <div className="text-center w-full"><div className="text-[9px] text-slate-400 font-black uppercase tracking-wider mb-0.5">分潤</div><div className={`font-black text-sm ${(!data?.commission_rate || data.commission_rate==='無') ? 'text-slate-400' : 'grad-brand'}`}>{data?.commission_rate||'-'}</div></div>
                <div className="w-px h-6 bg-slate-200 mx-2 self-center"></div>
                <div className="text-center w-full"><div className="text-[9px] text-slate-400 font-black uppercase tracking-wider mb-0.5">保底</div><div className="font-black text-sm text-slate-700">{data?.base_fee||'-'}</div></div>
              </div>
              <div className={`text-[9px] font-bold text-center pt-1 border-t border-slate-100 ${quoteOutdated ? 'text-red-500' : 'text-slate-400'}`}>報價更新: {data?.quote_updated_date||'未紀錄'} {quoteOutdated && '⚠️'}</div>
            </div>
          </div>

          {promoPlats.length > 0 && (
            <div className="mb-3 flex items-center gap-1.5 overflow-hidden">
              <span className="text-[10px] text-slate-400 font-bold shrink-0">開團於:</span>
              <div className="flex items-center gap-1 overflow-hidden">{promoPlats.map((p, i) => <span key={i} className="text-[10px] font-black text-brand bg-brand/10 px-1.5 py-0.5 rounded truncate">{p}</span>)}</div>
            </div>
          )}

          {data?.extra_platforms && typeof data.extra_platforms === 'string' && (
            <div className="mb-3 flex items-center gap-2 bg-slate-50 border border-slate-100 p-1.5 px-2.5 rounded-lg text-[11px] font-bold text-slate-600 w-full min-w-0">
              <Icon name="link" size={12} className="text-slate-400 shrink-0" /><div className="truncate flex-1 text-slate-500">{data.extra_platforms.split('\n')[0]}</div>
            </div>
          )}

          <div className="flex items-center justify-between mt-auto pt-3 border-t border-slate-100/80">
            <div className="flex-1 min-w-0 mr-3 relative">
              <div className="absolute right-0 top-0 bottom-[4px] w-8 bg-gradient-to-l from-white to-transparent z-10 pointer-events-none rounded-r-xl"></div>
              <div className="bg-slate-50 border border-slate-100 rounded-xl p-1.5">
                <div className="flex items-center gap-1.5 overflow-x-auto thin-scrollbar pb-1 pr-6 cursor-ew-resize">
                  {collabTags.length > 0 ? collabTags.map((tag, i) => <span key={i} className="shrink-0 px-2.5 py-1 bg-white text-slate-600 border border-slate-200 rounded-lg text-[10px] font-black whitespace-nowrap hover:border-brand/30 hover:text-brand transition-colors">{tag}</span>) : <span className="text-[10px] text-slate-300 font-bold px-1 whitespace-nowrap">無標籤</span>}
                </div>
              </div>
            </div>
            <div className="flex items-center gap-2 shrink-0">
              {data?.email && <a href={`mailto:${data.email}`} onClick={e=>e.stopPropagation()} className="hover:scale-110 hover:-translate-y-0.5 transition-all text-slate-400 hover:text-brand" title={`發送 Email: ${data.email}`}><Icon name="mail" size={18} /></a>}
              {data?.instagram_url && <a href={data.instagram_url} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()} className="hover:scale-110 hover:-translate-y-0.5 transition-all"><IconInstagram /></a>}
              {Object.entries(displaySocialsObj).map(([platform, url], i) => url ? <a key={i} href={url} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()} className="hover:scale-110 hover:-translate-y-0.5 transition-all" title={platform}>{getSocialIcon(platform)}</a> : <span key={i} className="opacity-30 grayscale cursor-help" title={`${platform} (未提供連結)`} onClick={e=>e.stopPropagation()}>{getSocialIcon(platform)}</span>)}
              {data?.reference_link && <a href={data.reference_link} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()} className="hover:scale-110 hover:-translate-y-0.5 transition-all text-amber-500"><Icon name="bookmark" size={18} stroke="#f59e0b" strokeWidth={2.5} /></a>}
              {data?.anytag_url && <a href={data.anytag_url} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()} className="text-slate-400 hover:text-brand hover:scale-110 transition-all"><Icon name="external" size={12} /></a>}
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    // 📋 DETAIL MODAL
    // ============================================================
    function DetailModal({ data, userRole, onClose, onEdit, onDelete }) {
      if (!data) return null;
      const tier = getTierInfo(data.followers);
      const quoteOutdated = isOlderThan6Months(data.quote_updated_date, 'dot');
