    const normalizeUrl = (url) => {
      if (!url || typeof url !== 'string') return '';
      let urlString = url.trim().toLowerCase();
      if (!urlString.startsWith('http://') && !urlString.startsWith('https://')) {
        urlString = 'https://' + urlString;
      }
      
      try {
        const parsed = new URL(urlString);
        const trackingParams = [
          'fbclid', 'igsh', 'ref', 'utm_source', 'utm_medium', 
          'utm_campaign', 'utm_content', 'utm_term', 'gclid'
        ];
        trackingParams.forEach(param => parsed.searchParams.delete(param));
        let host = parsed.hostname.replace(/^www\./, '');
        let result = host + parsed.pathname + parsed.search;
        return result.replace(/\/$/, '');
      } catch (e) {
        let clean = urlString.replace(/^https?:\/\//, '').replace(/^www\./, '');
        return clean.replace(/\/$/, '');
      }

      // 🛡️ 第一層防護：排除所有「非字串」或「無效字串內容」
      if (!jsonStr || typeof jsonStr !== 'string' || jsonStr === 'undefined' || jsonStr === 'null' || jsonStr.trim() === '') {
        return {};
      }

      try {
        let parsed = {};
        // 🛡️ 第二層防護：判斷是否為 JSON 格式 (以 { 開頭)
        if (jsonStr.trim().startsWith('{')) {
          const rawParsed = JSON.parse(jsonStr);
          if (rawParsed && typeof rawParsed === 'object') parsed = rawParsed;
        } else {
          // 如果不是 JSON，視為舊版的標籤格式（逗號分隔）
          const tags = jsonStr.split(',').map(s => s.trim()).filter(Boolean);
          tags.forEach(t => parsed[t] = ['']);
          return parsed;
        }
        
        // 🛡️ 第三層防護：標準化格式，確保所有欄位值都是陣列
        const normalized = {};
        Object.entries(parsed).forEach(([key, val]) => {
          if (Array.isArray(val)) {
            normalized[key] = val;
          } else if (typeof val === 'string') {
            normalized[key] = val.trim() ? [val] : ['']; 
          }
        });
        return normalized;

      const merged = mergeDisplaySocials(item);
      Object.values(merged).forEach(urlArray => {
        if (Array.isArray(urlArray)) {
          urlArray.forEach(u => {
            if (u && typeof u === 'string') urls.push(normalizeUrl(u));
          });
        }
      });
      // 過濾重複的 URL
      return [...new Set(urls)].filter(Boolean);
    };

    const isOlderThan6Months = (dateStr, format = 'iso') => {
      if (!dateStr || typeof dateStr !== 'string') return false;
      let year, month;
      if (format === 'dot') {
        const parts = dateStr.split('.'); if (parts.length !== 2) return false;
        year = parseInt(parts[0], 10); month = parseInt(parts[1], 10);
      } else {
        const d = new Date(dateStr); if (isNaN(d.getTime())) return false;
        year = d.getFullYear(); month = d.getMonth() + 1;
      }
      const now = new Date();
      return (now.getFullYear() - year) * 12 + ((now.getMonth() + 1) - month) >= 6;
    };

    const formatDate = (isoDateStr) => {
      if (!isoDateStr) return '未知';
      const d = new Date(isoDateStr); if (isNaN(d.getTime())) return '未知';
      return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
    };

    const renderLinks = (text) => {
      if (!text || typeof text !== 'string') return null;

        urlRegex.test(part)

            <a key={i} href={part} target="_blank" rel="noreferrer" onClick={e => e.stopPropagation()} 
               className="inline-flex items-center gap-1 px-2.5 py-1 mx-1 bg-brand/10 text-brand border border-brand/20 rounded-lg text-[11px] font-black hover:bg-brand hover:text-white transition-all shadow-sm align-middle leading-none">
              <Icon name="link" size={12} /> 點擊連結
            </a>
          )
          : <span key={i}>{part}</span>
      );
    };

    const FormField = ({ label, hint, hintStyle = 'brand', required, children, colSpan2 = false }) => (

    const inputCls = "w-full px-4 py-3 bg-white/60 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-brand/30 focus:border-brand transition-all shadow-sm text-sm";

const [conflictList, setConflictList] = useState([]); // 存放待審核的衝突清單

      const fetchData = async () => {
  setIsLoading(true);
  try {
    // 1. 基本查詢：抓取 influencers 並要求回傳總筆數
    let query = supabase
      .from('influencers')

    // 2. 處理關鍵字搜尋 (姓名 或 IG帳號)

    // 4. 處理進階篩選：粉絲數
    if (advFilters.followers !== 'all') {

      if (advFilters.followers === 'micro') query = query.gte('followers', 10000).lt('followers', 50000);
      if (advFilters.followers === 'macro') query = query.gte('followers', 50000).lt('followers', 150000);
      if (advFilters.followers === 'mega') query = query.gte('followers', 150000).lt('followers', 300000);
      if (advFilters.followers === 'toptier') query = query.gte('followers', 300000);
    }

    // 5. 處理進階篩選：開團平台 (只要有勾選的其中一個符合就顯示)
    if (advFilters.promoPlats.length > 0) {
      const platFilters = advFilters.promoPlats.map(plat => `promo_platforms.ilike.%${plat}%`).join(',');
      query = query.or(platFilters);
    }

    // 6. 處理進階篩選：合作模式 Tags (只要有勾選的其中一個符合就顯示)
    if (advFilters.tags.length > 0) {
      const tagFilters = advFilters.tags.map(tag => `collaboration_tags.ilike.%${tag}%`).join(',');
      query = query.or(tagFilters);
    }

    // 7. 處理進階篩選：僅顯示有報價 (保底費用 或 分潤比例 不是空的，且不是"無"和"-")
    if (advFilters.hasQuote) {
      // 在 Supabase 中，確保這兩個欄位不是空字串，且不是特定無效字眼
      query = query.or(`base_fee.neq.,base_fee.neq.無,base_fee.neq.-,commission_rate.neq.,commission_rate.neq.無,commission_rate.neq.-`);
    }

    // 8. 處理排序
    if (sortBy === 'newest') query = query.order('id', { ascending: false });
    else if (sortBy === 'oldest') query = query.order('id', { ascending: true });
    else if (sortBy === 'followers_desc') query = query.order('followers', { ascending: false });
    else if (sortBy === 'followers_asc') query = query.order('followers', { ascending: true });

    // 9. 處理分頁 (單點模式核心)
    const from = (currentPage - 1) * ITEMS_PER_PAGE;
    const to = from + ITEMS_PER_PAGE - 1;
    query = query.range(from, to);

    // 10. 執行請求
    const { data: result, count, error } = await query;
    const { data: cats } = await supabase.from('categories').select('*').order('id', { ascending: true });

    if (error) throw error;

    setData(result || []);
    setTotalCount(count || 0);
    setCategories(cats || []);
  } catch (err) {
    console.error("抓取失敗:", err);
  } finally {
    setIsLoading(false);
  }
};

      // 📝 雲端直連版：匯出 CSV
      const handleExportCSV = async () => {

            if (advFilters.hasQuote) {
              query = query.or(`base_fee.neq.,base_fee.neq.無,base_fee.neq.-,commission_rate.neq.,commission_rate.neq.無,commission_rate.neq.-`);
            }
            
            // 確保匯出的順序跟畫面上看的一樣
            if (sortBy === 'newest') query = query.order('id', { ascending: false });

          // 接下來就是原本的轉檔邏輯，把抓下來的 exportData 轉成 Excel 看得懂的 CSV 格式
          const headers = ['網紅姓名', '最高粉絲數', 'Email', 'Instagram', 'YouTube', 'Facebook', '其他社群連結', '額外曝光管道與說明', '合作模式 Tags', '固定開團平台', '保底費用 / 預計分潤', '備註'];
          const escapeCSV = (str) => {
            if (str === null || str === undefined) return '""';

          const rows = exportData.map(d => {

      };
// 📝 雲端智慧同步：處理新進資料 (抽出共用邏輯)
      const processIncomingData = async (uploadData) => {
        try {
          const { data: dbSummary, error: fetchErr } = await supabase
            .from('influencers')
            .select('id, user_id, name, email');
          if (fetchErr) throw fetchErr;

          const safeToUpsert = [];
          const conflicts = [];

          uploadData.forEach(incoming => {
            if (!incoming.user_id) return;
            const sameIdMatch = dbSummary.find(db => db.user_id?.toLowerCase() === incoming.user_id.toLowerCase());
            if (sameIdMatch) {
              safeToUpsert.push(incoming);
              return;
            }

            const inputName = (incoming.name || '').trim().toLowerCase();
            const inputEmail = (incoming.email || '').trim().toLowerCase();

            const suspicious = dbSummary.find(db => {
              const dbName = (db.name || '').toLowerCase();
              const dbEmail = (db.email || '').toLowerCase();
              const emailMatch = inputEmail && dbEmail && inputEmail === dbEmail;
              const nameSimilar = inputName.length >= 2 && (dbName.includes(inputName) || inputName.includes(dbName));
              return emailMatch || nameSimilar;
            });

            if (suspicious) {
              conflicts.push({ incoming, existing: suspicious });
            } else {
              safeToUpsert.push(incoming);
            }
          });

          if (safeToUpsert.length > 0) {
            const cleanedSafeData = safeToUpsert.map(d => ({
              ...d,
              followers: parseInt(String(d.followers).replace(/\D/g, ''), 10) || 0,
              last_updated_date: new Date().toISOString()
            }));
            const { error: upsertErr } = await supabase.from('influencers').upsert(cleanedSafeData, { onConflict: 'user_id' });
            if (upsertErr) throw upsertErr;
          }

          if (conflicts.length > 0) {
            setConflictList(conflicts);
            alert(`安全資料 ${safeToUpsert.length} 筆已同步！\n但發現 ${conflicts.length} 筆疑似重複，請進行人工審核。`);
          } else {
            alert(`同步完成！共處理 ${safeToUpsert.length} 筆資料。`);
          }
          fetchData();

          console.error("同步失敗:", err);
          alert(`🚨 同步出錯：${err.message}`);

          setIsLoading(false);

      const profileOutdated = isOlderThan6Months(data.last_updated_date, 'iso');
      const lastUpdatedText = formatDate(data.last_updated_date);
      const displaySocialsObj = mergeDisplaySocials(data);

      // ✅ 新增：一鍵無聲複製信箱邏輯
      const handleCopyEmail = (e) => {
        e.stopPropagation();
        e.preventDefault();
        navigator.clipboard.writeText(data.email);
        setCopiedEmail(true);
        setTimeout(() => setCopiedEmail(false), 2000);

              </div>
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    // 📝 FORM MODAL
    // ============================================================
    function FormModal({ existingData = [], categories = [], initialData, onClose, onSave, onViewDuplicate }) {
      const isEditing = !!initialData;
      const [showAdvanced, setShowAdvanced] = useState(isEditing);
      const [showAvatarHelp, setShowAvatarHelp] = useState(false);
      const [isSaving, setIsSaving] = useState(false);
      const [showCollabDD, setShowCollabDD] = useState(false);
      const [showSocialsDD, setShowSocialsDD] = useState(false);
      const [duplicateConflict, setDuplicateConflict] = useState(null); 
      const collabRef = useRef(null);
      const socialsRef = useRef(null);

      const socialOptions = ['Instagram','YouTube','Facebook','TikTok','Threads','小紅書','X (Twitter)','Discord','Twitch','Podcast','其他 (Blog/Website/Link in bio)'];

      const [formData, setFormData] = useState({
        id:null, instagram_url:'', user_id:'', name:'', email:'', followers:'', category:'',
        collaboration_tags:'', promo_platforms:'', avatar_url:'', commission_rate:'', base_fee:'',
        youtube_url:'', facebook_url:'', anytag_url:'', extra_platforms:'',
        other_social_platforms: JSON.stringify({"Instagram": [""]}), 
        reference_link:'', quote_updated_date:'', notes:''
      });

      useEffect(() => {
        if (initialData) {
          const safeParsed = mergeDisplaySocials(initialData);
          setFormData({ ...initialData, other_social_platforms: JSON.stringify(safeParsed), user_id: initialData.user_id||'' });
        }
      }, [initialData]);

      const otherSocialsObj = useMemo(() => parseOtherSocials(formData.other_social_platforms), [formData.other_social_platforms]);
      // ✅ 升級版：即時查重邏輯 (精準防攔截版)
      const liveConflict = useMemo(() => {
        if (isEditing) return null;
        const name = (formData.name || '').trim().toLowerCase();
        const email = (formData.email || '').trim().toLowerCase();
        const userId = (formData.user_id || '').trim().toLowerCase();
        
        const currentUrls = extractAllUrls({...formData, other_social_platforms: formData.other_social_platforms});

        if (name.length < 2 && !email && (userId === 'n/a' || !userId) && currentUrls.length === 0) return null;

        return existingData.find(d => {
          // 1. 檢查網址
          const dUrls = extractAllUrls(d);
          if (currentUrls.some(cu => dUrls.includes(cu))) return true;

          // 2. 檢查 ID
          if (userId && userId !== 'n/a' && d.user_id && userId === d.user_id.toLowerCase()) return true;

          // 3. 檢查 Email
          if (email && d.email && email === d.email.toLowerCase()) return true;

          // 4. 檢查姓名 (💡 核心修復：改用「互相包含」的強比對，不拆關鍵字，徹底解決攔截問題)
          const dName = (d.name || '').toLowerCase();
          if (name.length >= 2 && dName) {
            // 只要你打的字包含在資料庫裡，或資料庫包含你打的字，就抓出來
            if (dName.includes(name) || name.includes(dName)) return true;
          }
          
          return false;
        });
      }, [formData.name, formData.email, formData.user_id, formData.other_social_platforms, existingData]);

      useEffect(() => {
        const igUrl = otherSocialsObj['Instagram']?.[0] || '';
        const hasOther = Object.keys(otherSocialsObj).length > 0;
        
        setFormData(prev => {
          let nextId = prev.user_id;
          
          if (igUrl) {
            const extracted = extractIgUserId(igUrl);
            if (extracted && (!nextId || nextId === 'N/A')) nextId = extracted;
          } else if (hasOther && !nextId) {
            nextId = 'N/A';
          } else if (!hasOther && nextId === 'N/A') {
            nextId = '';
          }
          
          return prev.user_id === nextId ? prev : { ...prev, user_id: nextId };
        });
      }, [formData.other_social_platforms]);

      useEffect(() => {
        const handleClickOutside = e => {
          if (collabRef.current && !collabRef.current.contains(e.target)) setShowCollabDD(false);
          if (socialsRef.current && !socialsRef.current.contains(e.target)) setShowSocialsDD(false);
        };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      const handleSocialCheck = (opt, checked) => {
        const obj = {...otherSocialsObj};
        if (checked) obj[opt] = ['']; 
        else delete obj[opt];
        setFormData({...formData, other_social_platforms: JSON.stringify(obj)});
      };

      const handleSocialUrl = (opt, index, url) => {
        const obj = {...otherSocialsObj};
        if (!obj[opt]) obj[opt] = [''];
        obj[opt][index] = url;
        setFormData({...formData, other_social_platforms: JSON.stringify(obj)});
      };

      const addSocialUrl = (opt) => {
        const obj = {...otherSocialsObj};
        if (!obj[opt]) obj[opt] = [''];
        obj[opt].push('');
        setFormData({...formData, other_social_platforms: JSON.stringify(obj)});
      };

      const removeSocialUrl = (opt, index) => {
        const obj = {...otherSocialsObj};
        if (obj[opt] && obj[opt].length > 1) {
          obj[opt].splice(index, 1);
        } else {
          obj[opt] = [''];
        }
        setFormData({...formData, other_social_platforms: JSON.stringify(obj)});
      };

      // 💡 增加 isBypass 參數，預設為 false (雲端雷達升級版)
      const handleSubmit = async (e, isBypass = false) => {
        if (e) e.preventDefault();
        setDuplicateConflict(null);
        
        // 1. 【基本驗證】檢查必填欄位
        const missingFields = [];
        if (!formData.name) missingFields.push('網紅姓名');
        if (!formData.followers) missingFields.push('粉絲數');
        if (!formData.user_id) missingFields.push('帳號 ID');
        if (!formData.collaboration_tags?.trim()) missingFields.push('合作模式 Tags');
        
        const allInputUrls = Object.values(otherSocialsObj).flat().filter(u => u && u.trim() !== '');
        if (allInputUrls.length === 0) {
          missingFields.push('社群平台網址 (請至少填寫一個平台)');
        }

        if (missingFields.length > 0) {
          alert(`⚠️ 請填寫以下必填欄位：\n\n- ${missingFields.join('\n- ')}`);
          return;
        }

        // 2. 【格式驗證】檢查網址開頭
        const invalidUrls = allInputUrls.filter(u => !/^https?:\/\//i.test(u.trim()));
        if (invalidUrls.length > 0) {
          alert('⚠️ 網址格式錯誤：\n\n主力社群平台網址必須包含 "https://" 完整開頭！');
          return;
        }

        // 鎖定按鈕，防止使用者連點
        setIsSaving(true);

        // 3. 【雲端防撞雷達】去 Supabase 尋找潛在重複的資料
        const currentUrls = extractAllUrls({...formData, other_social_platforms: JSON.stringify(otherSocialsObj)});
        const inputName = (formData.name || '').trim().toLowerCase();
        const inputEmail = (formData.email || '').trim().toLowerCase();
        const inputUserId = (formData.user_id || '').trim().toLowerCase();

        let hardMatch = null;   // 🔴 絕對重複 (網址/ID)
        let softMatch = null;   // 🟠 疑似重複 (Email/姓名智慧模糊比對)

        try {
          // 3-1. 建立雲端通緝條件
          const orConditions = [];
          if (inputUserId && inputUserId !== 'n/a') orConditions.push(`user_id.ilike.${inputUserId}`);
          if (inputEmail) orConditions.push(`email.ilike.${inputEmail}`);
          if (inputName.length >= 2) orConditions.push(`name.ilike.%${inputName}%`);
          
          currentUrls.forEach(url => {
            const cleanUrl = url.replace(/,/g, ''); // 避免逗號破壞 Supabase 語法
            if (cleanUrl) {
              orConditions.push(`other_social_platforms.ilike.%${cleanUrl}%`);
              orConditions.push(`instagram_url.ilike.%${cleanUrl}%`);
              orConditions.push(`youtube_url.ilike.%${cleanUrl}%`);
              orConditions.push(`facebook_url.ilike.%${cleanUrl}%`);
            }
          });

          // 3-2. 發送偵察機去 Supabase 抓嫌疑犯
          let potentialConflicts = [];
          if (orConditions.length > 0 && !isBypass) {
            const { data: conflicts, error } = await supabase
              .from('influencers')
              .select('*')
              .or(orConditions.join(','));
              
            if (error) throw error;
            potentialConflicts = conflicts || [];
          }

          // 3-3. 讓抓回來的嫌疑犯，跑我們原本寫好的精準判斷邏輯
          potentialConflicts.forEach(d => {
            if (String(d.id) === String(formData.id)) return; // 編輯模式跳過自己

            // --- 🔴 第一層：絕對比對 (網址或帳號 ID) ---
            const dUrls = extractAllUrls(d);
            const hasUrlMatch = currentUrls.some(cu => dUrls.includes(cu));
            const hasIdMatch = inputUserId !== 'n/a' && d.user_id && d.user_id.toLowerCase() === inputUserId;
            
            if (hasUrlMatch || hasIdMatch) {
              hardMatch = d;
              return;
            }

            // --- 🟠 第二層：智慧模糊比對 (Email 或 姓名關鍵字) ---
            if (!hardMatch) {
              const dName = (d.name || '').toLowerCase();
              const dEmail = (d.email || '').toLowerCase();

              const emailMatch = inputEmail && dEmail && inputEmail === dEmail;
              let nameSimilar = false;
              if (inputName.length >= 2 && dName) {
                if (dName.includes(inputName) || inputName.includes(dName)) nameSimilar = true;
              }

              if (emailMatch || nameSimilar) {
                softMatch = d;
              }
            }
          });
        } catch (err) {
          console.error("查重雷達發生錯誤，但允許繼續存檔:", err);
        }

        // 3-4. 判斷雷達結果並觸發 UI 警告
        if (hardMatch) {
          setDuplicateConflict({ ...hardMatch, type: 'hard' }); 
          document.getElementById('form-scroll-area')?.scrollTo({top: 0, behavior: 'smooth'});
          setIsSaving(false); // 記得解除按鈕鎖定
          return;
        }

        if (softMatch && !formData.ignoreSoftWarning && !isBypass) {
          setDuplicateConflict({ ...softMatch, type: 'soft' }); 
          document.getElementById('form-scroll-area')?.scrollTo({top: 0, behavior: 'smooth'});
          setIsSaving(false); // 記得解除按鈕鎖定
          return;
        }

        // 4. 【執行儲存】通過所有雷達後，正式存檔
        try {
          const payload = {...formData};
          
          // 拔除 UI 旗標
          delete payload.ignoreSoftWarning;
          delete payload.type; 

          payload.followers = parseInt(String(payload.followers).replace(/,/g,''),10) || 0;
          
          // 回填至舊有的單行欄位以維持相容性
          payload.instagram_url = (otherSocialsObj['Instagram'] && otherSocialsObj['Instagram'][0]) || '';
          payload.youtube_url = (otherSocialsObj['YouTube'] && otherSocialsObj['YouTube'][0]) || '';
          payload.facebook_url = (otherSocialsObj['Facebook'] && otherSocialsObj['Facebook'][0]) || '';
          
          await onSave(payload, isEditing, initialData?.id);
          
          setFormData(prev => ({...prev, ignoreSoftWarning: false}));
        } catch (err) {
          console.error("Form Submit Failed:", err);
        } finally { 
          setIsSaving(false); 
        }
      };

      const startFormTour = () => {
        if (!window.driver) return alert('載入導覽套件失敗，請稍後重試。');
        const driverObj = window.driver.js.driver({
          showProgress: true, nextBtnText: '下一步', prevBtnText: '上一步', doneBtnText: '完成教學',
          steps: [
            { element: '#tour-form-social', popover: { title: '1. 社群網址', description: '支援多個平台與多重網址，有填寫 IG 系統會自動幫您抓取帳號 ID。', side: "bottom", align: 'start' }},
            { element: '#tour-form-followers', popover: { title: '2. 粉絲數', description: '請直接輸入純數字，例如「150000」。若有多個平台，請填寫粉絲數最高的那個。', side: "bottom", align: 'start' }},
            { element: '#tour-form-advanced', popover: { title: '3. 進階商業資訊', description: '點擊此區塊可以展開填寫更詳細的保底費用、分潤比率以及開團平台等進階資訊。', side: "top", align: 'start' }},
            { element: '#tour-form-avatar', popover: { title: '4. 大頭貼網址', description: '請貼上圖片的直連網址。如果不知道怎麼抓取，可以點擊旁邊的「教學」按鈕獲取秘技！', side: "top", align: 'start' }},
            { element: '#tour-form-save', popover: { title: '5. 儲存檔案', description: '確認資料都填寫完畢後，點擊這裡就可以建立或更新網紅檔案囉！', side: "top", align: 'end' }}
          ]
        });
        driverObj.drive();
      };

      const bookmarkletCode = `javascript:(function()%7Bvar%20html=document.documentElement.innerHTML;var%20match=html.match(/https:%5C/%5C/storage%5C.googleapis%5C.com%5C/ca-avatar%5C/%5B%5E%22'%5Cs%5C)%5D+/);if(match)%7Bvar%20url=match%5B0%5D.replace(/&quot;/g,%22%22);navigator.clipboard.writeText(url).then(function()%7Balert('%E2%9C%85%20%E6%8A%93%E5%8F%96%E6%88%90%E5%8A%9F%EF%BC%81%E7%B6%B2%E5%9D%80%E5%B7%B2%E8%A4%87%E8%A3%BD%E5%88%B0%E5%89%AA%E8%B2%BC%E7%B0%BF%EF%BC%9A%5Cn%5Cn'+url);%7D).catch(function()%7Bprompt('%E8%AB%8B%E6%89%8B%E5%8B%95%E8%A4%87%E8%A3%BD%EF%BC%9A',url);%7D);%7Delse%7Balert('%E2%9D%8C%20%E6%89%BE%E4%B8%8D%E5%88%B0%E9%A0%AD%E8%B2%BC%E7%B6%B2%E5%9D%80');%7D%7D)();`;

      return (
        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-md z-50 flex items-center justify-center p-4 animate-fade-in">
          <div className="bg-white/95 backdrop-blur-2xl border border-white rounded-3xl w-full max-w-2xl max-h-[90vh] flex flex-col shadow-[0_24px_80px_rgba(0,0,0,0.12)] overflow-hidden animate-zoom-in">
            <div className="sidebar-top-accent" />
            <div className="px-8 py-5 border-b border-slate-100 flex items-center justify-between shrink-0">
              <div className="flex items-center gap-3">
                <h2 className="text-lg font-black grad-brand">{isEditing ? '編輯網紅檔案' : '新增網紅檔案'}</h2>
                <button type="button" onClick={startFormTour} className="flex items-center gap-1.5 px-3 py-1.5 bg-brand/10 hover:bg-brand/20 text-brand rounded-full text-xs font-bold transition-colors">
                  <Icon name="help" size={14} /> 填寫教學
                </button>
              </div>
              <button type="button" onClick={onClose} className="p-2 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-full transition-colors"><Icon name="x" size={18} /></button>
            </div>

            <form id="creatorForm" onSubmit={handleSubmit} noValidate className="flex flex-col flex-1 overflow-hidden min-h-0">
              <div id="form-scroll-area" className="p-8 overflow-y-auto flex-1 no-scrollbar space-y-8">
                
                {duplicateConflict && (
                  <div className={`${duplicateConflict.type === 'hard' ? 'bg-red-50 border-red-200' : 'bg-amber-50 border-amber-200'} border-2 rounded-2xl p-4 md:p-5 animate-slide-down`}>
                    <div className="flex flex-col gap-4">
                      {/* 上半部：圖示與文字內容 */}
                      <div className="flex items-start gap-3">
                        <div className={`shrink-0 mt-0.5 ${duplicateConflict.type === 'hard' ? 'text-red-500' : 'text-amber-500'}`}>
                          <Icon name={duplicateConflict.type === 'hard' ? 'triangle' : 'info'} size={20} strokeWidth={2.5} />
                        </div>
                        <div className="min-w-0 flex-1"> {/* 💡 min-w-0 是防止文字擠爆的關鍵 */}
                          <h4 className={`font-black text-sm mb-1 ${duplicateConflict.type === 'hard' ? 'text-red-700' : 'text-amber-700'}`}>
                            {duplicateConflict.type === 'hard' ? '🚨 發現重複建檔！' : '💡 發現極為相似的網紅'}
                          </h4>
                          <p className={`text-xs font-bold leading-relaxed break-words ${duplicateConflict.type === 'hard' ? 'text-red-600' : 'text-amber-600'}`}>
                            {duplicateConflict.type === 'hard' 
                              ? `網址或 ID 與現有檔案「${duplicateConflict.name}」重複。請勿重複建檔！`
                              : `系統發現「${duplicateConflict.name}」的姓名或 Email 與您填寫的內容高度相似。請問是同一人嗎？`}
                          </p>
                        </div>
                      </div>

                      {/* 下半部：按鈕操作區 (在手機版自動堆疊) */}
                      <div className="flex flex-wrap md:flex-nowrap items-center justify-end gap-2 pt-2 border-t border-black/5">
                        <button 
                          type="button" 
                          onClick={(e) => { e.preventDefault(); onViewDuplicate(duplicateConflict); }} 
                          className="flex-1 md:flex-none bg-white border border-slate-200 px-4 py-2.5 rounded-xl text-[11px] font-black hover:bg-slate-50 transition-all flex items-center justify-center gap-1.5 text-slate-700 shadow-sm"
                        >
                          <Icon name="external" size={12} /> 查看現有檔案
                        </button>
                        
                        {duplicateConflict.type === 'soft' && (
                          <button 
                            type="button" 
                            onClick={(e) => { 
  e.preventDefault();
  // 💡 直接呼叫 handleSubmit 並送入通行證 (true)
  handleSubmit(e, true); 
}} 
                            className="flex-1 md:flex-none bg-amber-600 text-white px-4 py-2.5 rounded-xl text-[11px] font-black hover:bg-amber-700 transition-all shadow-md active:scale-95"
                          >
                            不同人，繼續存檔
                          </button>
                        )}
                      </div>
                    </div>
                  </div>
                )}

                <div className="space-y-5">
                  <div className="flex items-center gap-2 mb-3">
                    <span className="bg-brand/10 text-brand text-xs font-black px-2 py-1 rounded-lg">區塊 A</span><h3 className="font-black text-slate-800">基本資料</h3>
                  </div>
                  
                  <div id="tour-form-social" className="space-y-5">
                    <FormField label="社群平台網址" hint="💡 支援多平台、多重網址，點擊右方箭頭新增平台" required colSpan2>
                      <div ref={socialsRef} className="relative mb-3">
                        <div onClick={() => setShowSocialsDD(!showSocialsDD)} className={`${inputCls} cursor-pointer flex justify-between items-center ${showSocialsDD ? 'ring-2 ring-brand/30 border-brand' : ''}`}>
                          <span className={Object.keys(otherSocialsObj).length > 0 ? "text-slate-800 font-bold truncate pr-2" : "text-slate-400"}>{Object.keys(otherSocialsObj).length > 0 ? Object.keys(otherSocialsObj).join(', ') : '新增 Instagram, YouTube, TikTok...'}</span>
                          <span className={`text-slate-400 transition-transform ${showSocialsDD ? 'rotate-180' : ''}`}><Icon name="chevdown" size={18} /></span>
                        </div>
                        {showSocialsDD && (
                          <div className="absolute z-20 mt-1 w-full bg-white border border-slate-100 shadow-[0_10px_40px_rgba(0,0,0,0.1)] rounded-2xl p-3 grid grid-cols-2 sm:grid-cols-3 gap-2 animate-slide-down">
                            {socialOptions.map(opt => {
                              const checked = otherSocialsObj.hasOwnProperty(opt);
                              return (
                                <label key={opt} className={`flex items-center gap-2 text-sm font-bold cursor-pointer p-2.5 rounded-xl transition-all ${checked ? 'bg-brand/10 text-brand' : 'text-slate-600 hover:bg-slate-50'}`}>
                                  <input type="checkbox" checked={checked} onChange={e => handleSocialCheck(opt, e.target.checked)} className="rounded border-slate-300 text-brand focus:ring-brand h-4 w-4 shrink-0" /><span className="truncate">{opt}</span>
                                </label>
                              );
                            })}
                          </div>
                        )}
                      </div>
                      
                      {Object.keys(otherSocialsObj).length > 0 && (
                        <div className="space-y-4 p-5 bg-slate-50 border border-slate-100 rounded-2xl shadow-inner">
                          <div className="text-xs font-bold text-slate-400 flex items-center gap-1.5 mb-1"><Icon name="info" size={14} /> 貼上對應平台網址：</div>
                          
                          {Object.entries(otherSocialsObj).map(([opt, urls]) => (
                            <div key={opt} className="space-y-2.5 pt-4 border-t border-slate-200/70 first:border-0 first:pt-0">
                              <div className="flex items-center justify-between">
                                <span className="text-sm font-black text-slate-700">{opt}</span>
                                <button type="button" onClick={() => addSocialUrl(opt)} className="text-[10px] font-bold text-brand bg-brand/10 hover:bg-brand/20 px-2.5 py-1.5 rounded-lg transition-colors flex items-center gap-1">
                                  <Icon name="plus" size={12} strokeWidth={3} /> 新增網址
                                </button>
                              </div>
                              
                              {Array.isArray(urls) && urls.map((url, idx) => (
                                <div key={idx} className="flex items-center gap-2 animate-fade-in">
                                  <input type="text" placeholder={`https://... (${opt} 網址 ${idx + 1})`} value={url} onChange={e => handleSocialUrl(opt, idx, e.target.value)} className={inputCls} />
                                  {liveConflict && url && extractAllUrls(liveConflict).includes(normalizeUrl(url)) && (
  <div className="text-[10px] text-red-600 font-bold mt-1 flex items-center gap-1 animate-fade-in">
    <Icon name="triangle" size={10} /> 此網址已由「{liveConflict.name}」佔用
  </div>
)}
                                  {urls.length > 1 && (
                                    <button type="button" onClick={() => removeSocialUrl(opt, idx)} className="shrink-0 p-3 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-colors border border-transparent hover:border-red-100" title="移除此網址">
                                      <Icon name="trash" size={16} />
                                    </button>
                                  )}
                                </div>
                              ))}
                            </div>
                          ))}
                        </div>
                      )}
                    </FormField>
                  </div>
                  
                  <FormField label="額外曝光管道" hint="💡 不同管道網址請直接換行貼上" hintStyle="gray" colSpan2>
                    <textarea 
                      rows="3" 
                      placeholder="💡 例：Line社群、FB私密社團、7-11賣貨便等... 請直接換行貼上不同管道的網址或說明" 
                      value={formData.extra_platforms||''} 
                      onChange={e => {
                        const newVal = e.target.value;
                        // 💡 智慧防呆：偵測到 line.me 就自動勾選 Line群
                        let updatedPlats = formData.promo_platforms ? formData.promo_platforms.split(',').map(s=>s.trim()).filter(Boolean) : [];
                        if (newVal.toLowerCase().includes('line.me') && !updatedPlats.includes('Line群')) {
                          updatedPlats.push('Line群');
                        }
                        setFormData({...formData, extra_platforms: newVal, promo_platforms: updatedPlats.join(', ')});
                      }} 
                      className={`${inputCls} resize-none leading-relaxed border-dashed`} 
                    />
                  </FormField>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <FormField label="網紅姓名" required>
  <input type="text" value={formData.name} onChange={e => setFormData({...formData, name:e.target.value})} className={inputCls} />
  {/* 💡 新增：即時提示 */}
  {liveConflict && formData.name.length >= 2 && (liveConflict.name.toLowerCase().includes((formData.name||'').toLowerCase()) || (formData.name||'').toLowerCase().includes(liveConflict.name.toLowerCase())) && (
    <div className="text-[10px] text-amber-600 font-bold mt-1 flex items-center gap-1 animate-fade-in">
      <Icon name="info" size={10} /> 系統已有相似名稱：{liveConflict.name}
    </div>
  )}
</FormField>
                    <div id="tour-form-followers" className="w-full">
                      <FormField label="粉絲數" hint="💡 填寫最高平台數字" required><input type="text" placeholder="例：150000" value={formData.followers} onChange={e => setFormData({...formData, followers:e.target.value})} className={inputCls} /></FormField>
                    </div>
                  </div>
                  <FormField label="Email 聯絡信箱" colSpan2>
  <input type="text" placeholder="hello@example.com" value={formData.email||''} onChange={e => setFormData({...formData, email:e.target.value})} className={inputCls} />
  {/* 💡 新增：即時提示 */}
  {liveConflict && formData.email && liveConflict.email?.toLowerCase() === formData.email.toLowerCase() && (
    <div className="text-[10px] text-amber-600 font-bold mt-1 flex items-center gap-1 animate-fade-in">
      <Icon name="info" size={10} /> 此 Email 已由「{liveConflict.name}」使用
    </div>
  )}
</FormField>
                  <FormField label="內容分類 (複選)" colSpan2>
                    <div className="grid grid-cols-2 sm:grid-cols-3 gap-2 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                      {categories.map(cat => {
                        const checked = formData.category?.includes(cat.name) || false;
                        return (
                          <label key={cat.id} className={`flex items-center gap-2 text-sm font-bold cursor-pointer p-2 rounded-xl transition-all ${checked ? 'bg-brand/10 text-brand' : 'text-slate-600 hover:bg-white'}`}>
                            <input type="checkbox" checked={checked} onChange={e => {
                              let cats = formData.category ? formData.category.split(',').map(s=>s.trim()).filter(Boolean) : [];
                              if (e.target.checked) cats.push(cat.name); else cats = cats.filter(c => c !== cat.name);
                              setFormData({...formData, category: cats.join(', ')});
                            }} className="rounded border-slate-300 text-brand focus:ring-brand h-4 w-4" /><span className="truncate">{cat.name}</span>
                          </label>
                        );
                      })}
                    </div>
                  </FormField>

                  <FormField label="合作模式 Tags" required colSpan2>
                    <div ref={collabRef} className="relative">
                      <div onClick={() => setShowCollabDD(!showCollabDD)} className={`${inputCls} cursor-pointer flex justify-between items-center ${showCollabDD ? 'ring-2 ring-brand/30 border-brand' : ''}`}>
                        <span className={formData.collaboration_tags ? "text-slate-800 font-bold truncate pr-2" : "text-slate-400"}>{formData.collaboration_tags||'請選擇合作模式...'}</span>
                        <Icon name={showCollabDD ? 'chevup' : 'chevdown'} size={18} className="text-slate-400 shrink-0" />
                      </div>
                      {showCollabDD && (
                        <div className="absolute z-20 mt-1 w-full bg-white border border-slate-100 shadow-[0_10px_40px_rgba(0,0,0,0.1)] rounded-2xl p-3 grid grid-cols-2 sm:grid-cols-3 gap-2 animate-slide-down">
                          {COLLAB_OPTIONS.map(opt => {
                            const checked = formData.collaboration_tags?.includes(opt) || false;
                            return (
                              <label key={opt} className={`flex items-center gap-2 text-sm font-bold cursor-pointer p-2.5 rounded-xl transition-all ${checked ? 'bg-brand/10 text-brand' : 'text-slate-600 hover:bg-slate-50'}`}>
                                <input type="checkbox" checked={checked} onChange={e => {
                                  let tags = formData.collaboration_tags ? formData.collaboration_tags.split(',').map(s=>s.trim()).filter(Boolean) : [];
                                  if (e.target.checked) tags.push(opt); else tags = tags.filter(c=>c!==opt);
                                  setFormData({...formData, collaboration_tags:tags.join(', ')});
                                }} className="rounded border-slate-300 text-brand focus:ring-brand h-4 w-4 shrink-0" />{opt}
                              </label>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  </FormField>

                  <FormField label="帳號 ID" hint="💡 可手動編輯" required colSpan2>
  <input type="text" placeholder="有填IG會自動帶入，無IG則自動填N/A" value={formData.user_id} onChange={e => setFormData({...formData, user_id:e.target.value})} className={inputCls} />
  {/* 💡 新增：即時提示 */}
  {liveConflict && formData.user_id && formData.user_id !== 'N/A' && liveConflict.user_id?.toLowerCase() === formData.user_id.toLowerCase() && (
    <div className="text-[10px] text-amber-600 font-bold mt-1 flex items-center gap-1 animate-fade-in">
      <Icon name="info" size={10} /> 此 ID 已由「{liveConflict.name}」佔用
    </div>
  )}
</FormField>
                </div>

                <hr className="border-slate-100" />
                <div>
                  <button id="tour-form-advanced" type="button" onClick={() => setShowAdvanced(!showAdvanced)} className="w-full flex items-center justify-between p-4 bg-slate-50 hover:bg-white border border-slate-100 rounded-2xl transition-all shadow-sm">
                    <div className="flex items-center gap-3"><span className="bg-slate-200 text-slate-600 text-xs font-black px-2 py-1 rounded-lg">區塊 B</span><span className="font-black text-slate-700">進階商業資訊 (選填)</span></div>
                    <Icon name={showAdvanced ? 'chevup' : 'chevdown'} size={18} className="text-slate-400" />
                  </button>

                  {showAdvanced && (
                    <div className="mt-5 grid grid-cols-1 md:grid-cols-2 gap-5 animate-slide-down">
                      <FormField label="固定開團平台" hint="💡 通常在哪裡開團？(複選)" colSpan2>
                        <div className="flex flex-wrap gap-2 pt-1">
                          {PROMO_PLATFORM_OPTIONS.map(plat => {
                            const checked = formData.promo_platforms?.includes(plat) || false;
                            return (
                              <label key={plat} className={`flex items-center gap-1.5 cursor-pointer text-xs font-semibold px-3 py-1.5 rounded-lg border transition-all ${checked ? 'bg-brand/10 border-brand text-brand shadow-sm' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50'}`}>
                                <input type="checkbox" className="hidden" checked={checked} onChange={e => {
                                  let plats = formData.promo_platforms ? formData.promo_platforms.split(',').map(s=>s.trim()).filter(Boolean) : [];
                                  if (e.target.checked) plats.push(plat); else plats = plats.filter(p=>p!==plat);
                                  setFormData({...formData, promo_platforms:plats.join(', ')});
                                }} />{plat}
                              </label>
                            );
                          })}
                        </div>
                      </FormField>

                      <FormField label="預計分潤比率"><input type="text" value={formData.commission_rate||''} onChange={e => setFormData({...formData, commission_rate:e.target.value})} className={inputCls} /></FormField>
                      <FormField label="保底費用"><input type="text" value={formData.base_fee||''} onChange={e => setFormData({...formData, base_fee:e.target.value})} className={inputCls} /></FormField>
                      <FormField label="最新更新時間"><input type="text" placeholder="例：2026.03" value={formData.quote_updated_date||''} onChange={e => setFormData({...formData, quote_updated_date:e.target.value})} className={inputCls} /></FormField>
                      
                      <div id="tour-form-avatar" className="md:col-span-2">
                        <FormField label="大頭貼網址">
                          <div className="flex gap-2">
                            <input type="text" value={formData.avatar_url} onChange={e => setFormData({...formData, avatar_url:e.target.value})} className={`${inputCls} flex-1`} />
                            <button type="button" onClick={() => setShowAvatarHelp(!showAvatarHelp)} className="px-3 py-2 bg-brand/10 text-brand rounded-xl text-xs font-black flex items-center gap-1 hover:bg-brand/20 transition-colors shrink-0"><Icon name="help" size={13} /> 教學</button>
                          </div>
                          {showAvatarHelp && (
                            <div className="mt-3 p-5 bg-slate-900 text-white rounded-2xl shadow-xl border border-slate-700">
                              <h4 className="font-bold text-brand mb-1 flex items-center gap-2">🦊 如何抓取 AnyTag 頭貼URL？</h4><p className="text-xs text-amber-300 font-bold mb-3 ml-6 opacity-90">💡 書籤只需安裝一次，之後可永久使用！</p>
                              <ol className="text-sm space-y-1.5 text-slate-300 ml-5 list-decimal mb-4"><li>隨便把一個不相關的網頁存成瀏覽器書籤。</li><li>編輯該書籤，名稱改為「抓頭貼」，網址替換為下方代碼。</li><li>之後進到 AnyTag 網紅頁面，點擊書籤即可自動複製頭貼 URL！</li></ol>
                              <button type="button" onClick={() => { navigator.clipboard.writeText(bookmarkletCode).then(() => { alert('✅ 已複製！'); setShowAvatarHelp(false); }); }} className="w-full py-2.5 text-white font-bold rounded-xl flex items-center justify-center gap-2 transition-colors" style={{background:'linear-gradient(135deg,#E14f4b,#c75551)'}}><Icon name="copy" size={14} /> 一鍵複製秘技代碼</button>
                            </div>
                          )}
                        </FormField>
                      </div>

                      <FormField label="AnyTag Profile 網址"><input type="text" value={formData.anytag_url||''} onChange={e => setFormData({...formData, anytag_url:e.target.value})} className={inputCls} /></FormField>
                      <FormField label="參考貼文/連結"><input type="text" placeholder="https://..." value={formData.reference_link||''} onChange={e => setFormData({...formData, reference_link:e.target.value})} className={inputCls} /></FormField>
                      <FormField label="備註 Notes" colSpan2><textarea rows="3" placeholder="💡 例如：過往業績表現、合作注意事項、特殊禁忌..." value={formData.notes} onChange={e => setFormData({...formData, notes:e.target.value})} className={`${inputCls} resize-none`} /></FormField>
                    </div>
                  )}
                </div>
              </div>

              <div className="px-8 py-5 border-t border-slate-100 flex justify-end gap-3 bg-white/80 shrink-0">
                <button type="button" onClick={onClose} disabled={isSaving} className="px-6 py-3 text-sm font-bold text-slate-600 hover:bg-slate-100 rounded-2xl transition-all disabled:opacity-50">取消</button>
                <button id="tour-form-save" type="submit" disabled={isSaving} className="px-8 py-3 text-sm font-black text-white rounded-2xl shadow-glow transition-all hover:-translate-y-0.5 disabled:opacity-50 disabled:translate-y-0 disabled:shadow-none" style={{background:'linear-gradient(135deg,#E14f4b 0%,#f0857f 50%,#c75551 100%)'}}>{isSaving ? '處理中...' : (isEditing ? '儲存變更' : '建立檔案')}</button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    // ============================================================
    // 🗑️ CONFIRM DELETE MODAL
    // ============================================================
    function ConfirmDeleteModal({ data, onClose, onConfirm }) {
      const [isDeleting, setIsDeleting] = useState(false);
      const [errorMsg, setErrorMsg] = useState(null);
      if (!data) return null;

      const handleConfirm = async () => {
        setIsDeleting(true); setErrorMsg(null);
        try { await onConfirm(data); }
        catch (err) { setErrorMsg(err.message || '刪除時發生未知錯誤'); }
        finally { setIsDeleting(false); }
      };

      return (
        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[60] flex items-center justify-center p-4 animate-fade-in">
          <div className="bg-white rounded-[2rem] w-full max-w-sm p-8 shadow-2xl flex flex-col items-center text-center animate-zoom-in border border-slate-100">
            <div className="w-16 h-16 rounded-full bg-red-50 text-red-500 flex items-center justify-center mb-5 border border-red-100"><Icon name="triangle" size={28} stroke="#ef4444" strokeWidth={1.5} /></div>
            <h3 className="text-xl font-black text-slate-800 mb-3">確認刪除？</h3>
            <p className="text-slate-500 text-sm mb-6 leading-relaxed">即將永久刪除 <strong className="text-slate-800 font-black">{data.name}</strong> 的所有資料，此動作無法復原！</p>
            {errorMsg && <div className="w-full mb-5 p-3 bg-red-50 border border-red-200 text-red-600 text-sm font-bold rounded-xl text-left whitespace-pre-wrap break-all">⚠️ {errorMsg}</div>}
            <div className="flex gap-3 w-full">
              <button onClick={onClose} disabled={isDeleting} className="flex-1 py-3.5 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold rounded-2xl transition-colors disabled:opacity-50">保留</button>
              <button onClick={handleConfirm} disabled={isDeleting} className="flex-1 py-3.5 text-white font-black rounded-2xl shadow-[0_4px_15px_rgba(220,38,38,0.3)] transition-all hover:-translate-y-0.5 disabled:opacity-50 disabled:translate-y-0" style={{background:'linear-gradient(135deg,#dc2626,#b91c1c)'}}>{isDeleting ? '刪除中...' : '確認刪除'}</button>
            </div>
          </div>
        </div>
      );
    }

// 🚩 異常回報彈窗 (Conflict Resolution)
    function ConflictReportModal({ list, onClose, onHandled }) {
      if (!list || list.length === 0) return null;

      const handleFix = async (incoming, existingId, action) => {
        try {
          if (action === 'merge') {
            // 是同一人：覆蓋舊檔案
            const payload = { ...incoming, last_updated_date: new Date().toISOString() };
            delete payload.id;
            const { error } = await supabase.from('influencers').update(payload).eq('id', existingId);
            if (error) throw error;
          } else {
            // 不同人：強行新增
            const payload = { ...incoming, last_updated_date: new Date().toISOString() };
            const { error } = await supabase.from('influencers').insert([payload]);
            if (error) throw error;
          }
          onHandled(incoming.user_id); // 處理完後從清單移除該筆
        } catch (err) {
          alert("處理失敗: " + err.message);
        }
      };

      return (
        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[100] flex items-center justify-center p-4 animate-fade-in">
          <div className="bg-white rounded-[2.5rem] w-full max-w-4xl max-h-[85vh] flex flex-col shadow-2xl overflow-hidden animate-zoom-in">
            <div className="p-8 border-b border-slate-100 flex justify-between items-center bg-amber-50">
              <div>
                <h3 className="text-xl font-black text-amber-800">🚨 疑似重複資料回報</h3>
                <p className="text-sm text-amber-600 font-bold">系統發現以下資料與在庫檔案極為相似，請人工判定是否為同一人。</p>
              </div>
              <button onClick={onClose} className="p-2 bg-white rounded-full text-slate-400 hover:text-slate-600"><Icon name="x" size={24} /></button>
            </div>
            <div className="flex-1 overflow-y-auto p-8 space-y-6 no-scrollbar">
              {list.map((item, index) => (
                <div key={index} className="grid grid-cols-11 gap-4 items-center p-6 bg-slate-50 rounded-3xl border border-slate-200">
                  <div className="col-span-5">
                    <div className="text-[10px] font-black text-slate-400 uppercase mb-2">上傳的新資料</div>
                    <div className="font-black text-slate-800">{item.incoming.name}</div>
                    <div className="text-xs text-slate-500">ID: {item.incoming.user_id}</div>
                    <div className="text-xs text-slate-500 truncate">Email: {item.incoming.email || '無'}</div>
                  </div>
                  <div className="col-span-1 flex justify-center text-slate-300"><Icon name="external" size={20} /></div>
                  <div className="col-span-5">
                    <div className="text-[10px] font-black text-amber-500 uppercase mb-2">在庫相似檔案</div>
                    <div className="font-black text-slate-800">{item.existing.name}</div>
                    <div className="text-xs text-slate-500">ID: {item.existing.user_id}</div>
                    <div className="text-xs text-amber-600 font-bold truncate">Email: {item.existing.email || '無'}</div>
                  </div>
                  <div className="col-span-11 mt-4 pt-4 border-t border-slate-200 flex justify-end gap-3">
                    <button onClick={() => handleFix(item.incoming, item.existing.id, 'ignore')} className="px-4 py-2 bg-white text-slate-500 border border-slate-200 rounded-xl text-xs font-bold hover:bg-slate-100">是不同人，強行新增</button>
                    <button onClick={() => handleFix(item.incoming, item.existing.id, 'merge')} className="px-4 py-2 bg-amber-600 text-white rounded-xl text-xs font-black shadow-md hover:bg-amber-700">是同一人，覆蓋更新舊資料</button>
                  </div>
                </div>
              ))}
            </div>
            <div className="p-6 bg-slate-50 border-t border-slate-100 text-center">
              <button onClick={onClose} className="px-10 py-3 bg-slate-800 text-white rounded-2xl font-black shadow-lg">暫時關閉</button>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>
</html>
