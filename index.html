              <div className="flex items-end gap-6 mb-8 pb-8 border-b border-slate-100 relative">
                {profileOutdated && <div className="absolute top-0 left-0 bg-amber-50 text-amber-700 text-xs font-bold px-3 py-1.5 rounded-full border border-amber-200 flex items-center gap-1.5 shadow-sm"><span className="relative flex h-2 w-2"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-amber-400 opacity-75"></span><span className="relative inline-flex rounded-full h-2 w-2 bg-amber-500"></span></span>粉絲數可能已過期（最後更新: {lastUpdatedText}）</div>}
                <div className={profileOutdated ? 'mt-10' : ''}>
                  {data.avatar_url ? <img src={data.avatar_url} alt={data.name} className="w-24 h-24 rounded-2xl object-cover shadow-lg border-4 border-white" /> : <div className="w-24 h-24 rounded-2xl border-4 border-white flex items-center justify-center text-3xl font-black text-white shadow-lg" style={{background:'linear-gradient(135deg,#E14f4b,#c75551)'}}>{getInitials(data.name)}</div>}
                </div>
                <div className={profileOutdated ? 'mt-10' : ''}>
                  <div className="flex items-center gap-3 mb-2"><h2 className="text-2xl font-black grad-brand">{data.name}</h2><span className={`px-3 py-1 rounded-xl text-xs font-black uppercase border ${tier.color}`}>{tier.label}</span></div>
                  <p className="text-slate-500 font-semibold">@{data.user_id}</p>
                </div>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div className="space-y-6">
                  <div>
                    <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.12em] mb-3">Metrics</h3>
                    <div className="bg-slate-50 rounded-2xl p-5 border border-slate-100 flex justify-between items-center group/foll relative">
                      <div className="flex items-center gap-1.5 cursor-help"><span className="text-slate-500 text-sm font-bold">最高粉絲數</span><Icon name="info" size={15} className="text-slate-400" /></div>
                      <span className="font-black text-xl grad-dark">{Number(String(data.followers).replace(/,/g,'')).toLocaleString()}</span>
                      <div className="absolute left-5 bottom-full mb-2 w-max max-w-[240px] p-2.5 bg-slate-900 text-white text-[10px] rounded-lg opacity-0 group-hover/foll:opacity-100 transition-opacity pointer-events-none shadow-xl z-30 font-medium leading-relaxed">💡 此為建檔/更新時的靜態數據，最新粉絲數請以實際社群平台為準。</div>
                    </div>
                  </div>
                  <div>
                    <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.12em] mb-3">Commercial Quote</h3>
                    <div className="bg-slate-50 rounded-2xl p-5 space-y-4 border border-slate-100">
                      <div className="flex justify-between items-center"><span className="text-slate-500 text-sm font-bold">預計分潤</span><span className="font-black text-lg grad-brand">{data.commission_rate||'無'}</span></div>
                      <div className="flex justify-between items-center"><span className="text-slate-500 text-sm font-bold">保底費用</span><span className="font-black text-lg text-slate-800">{data.base_fee||'無'}</span></div>
                      <div className="pt-3 border-t border-slate-200 flex justify-between items-center"><span className="text-xs text-slate-400 font-bold">報價更新</span><span className={`text-xs font-black px-2.5 py-1 rounded-lg ${quoteOutdated ? 'bg-red-100 text-red-600' : 'bg-slate-200 text-slate-600'}`}>{data.quote_updated_date||'未填'} {quoteOutdated && '⚠️'}</span></div>
                    </div>
                  </div>
                  <div>
                    <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.12em] mb-3">Tags & Platforms</h3>
                    <div className="space-y-2">
                      <div className="flex flex-wrap gap-2">{parseTags(data.category).map((t,i)=><span key={i} className="px-3 py-1.5 bg-white border border-slate-200 text-slate-600 rounded-xl text-xs font-bold shadow-sm">{t}</span>)}</div>
                      <div className="flex flex-wrap gap-2">{parseTags(data.collaboration_tags).map((t,i)=><span key={i} className="px-3 py-1.5 bg-slate-800 text-white rounded-xl text-xs font-bold">{t}</span>)}</div>
                      <div className="flex flex-wrap gap-2">{parseTags(data.promo_platforms).map((t,i)=><span key={i} className="px-3 py-1.5 bg-brand/5 text-brand border border-brand/15 rounded-xl text-xs font-bold">{t}</span>)}</div>
                    </div>
                  </div>
                </div>

                <div className="space-y-6">
                  <div>
                    <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.12em] mb-3">Contact & Links</h3>
                    <div className="space-y-2.5">
                      {data.email && <a href={`mailto:${data.email}`} className="flex items-center gap-3 text-sm font-bold text-slate-700 bg-white p-3.5 rounded-2xl border-2 border-slate-200 hover:border-brand/30 hover:shadow-md hover:-translate-y-0.5 transition-all"><span className="w-5 h-5 flex items-center justify-center text-slate-400"><Icon name="mail" size={20} /></span>{data.email}</a>}
                      {data.instagram_url && <a href={data.instagram_url} target="_blank" rel="noreferrer" className="flex items-center gap-3 text-sm font-bold text-slate-700 bg-slate-50 p-3.5 rounded-2xl border border-slate-100 hover:shadow-md hover:-translate-y-0.5 transition-all"><IconInstagram /> Instagram</a>}
                      {Object.entries(displaySocialsObj).map(([platform,url],i) => url ? <a key={i} href={url} target="_blank" rel="noreferrer" className="flex items-center gap-3 text-sm font-bold text-slate-700 bg-slate-50 p-3.5 rounded-2xl border border-slate-100 hover:shadow-md hover:-translate-y-0.5 transition-all"><span className="w-5 h-5 flex items-center justify-center">{getSocialIcon(platform)}</span>{platform}</a> : <div key={i} className="flex items-center gap-3 text-sm font-bold text-slate-400 bg-slate-50 p-3.5 rounded-2xl border border-slate-100 cursor-not-allowed"><span className="grayscale opacity-50 w-5 h-5 flex items-center justify-center">{getSocialIcon(platform)}</span>{platform} (未提供網址)</div>)}
                      {data.reference_link && <a href={data.reference_link} target="_blank" rel="noreferrer" className="flex items-center gap-3 text-sm font-bold text-slate-700 bg-amber-50 p-3.5 rounded-2xl border border-amber-100 hover:shadow-md hover:-translate-y-0.5 transition-all"><Icon name="bookmark" size={18} stroke="#f59e0b" strokeWidth={2.5} /> 參考貼文</a>}
                      {data.anytag_url && <a href={data.anytag_url} target="_blank" rel="noreferrer" className="flex items-center gap-3 text-sm font-black text-brand bg-brand/5 p-3.5 rounded-2xl border border-brand/15 hover:shadow-md hover:-translate-y-0.5 transition-all"><Icon name="external" size={14} className="text-brand" /> AnyTag Profile</a>}
                    </div>
                  </div>
                  {data.extra_platforms && <div><h3 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.12em] mb-3">額外曝光管道</h3><div className="text-sm text-slate-700 font-semibold bg-slate-50 p-4 rounded-2xl border border-slate-100 flex items-start gap-3"><Icon name="link" size={16} className="text-slate-400 shrink-0 mt-0.5" /><div className="whitespace-pre-wrap leading-relaxed break-words space-y-1">{renderLinks(data.extra_platforms)}</div></div></div>}
                  {data.notes && <div><h3 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.12em] mb-3">Notes</h3><div className="text-sm text-slate-700 font-medium whitespace-pre-wrap leading-relaxed bg-amber-50 p-5 rounded-2xl border border-amber-100 flex gap-3"><Icon name="info" size={16} className="text-amber-400 shrink-0 mt-0.5" /><div>{data.notes}</div></div></div>}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    // 📝 FORM MODAL
    // ============================================================
    function FormModal({ existingData = [], categories = [], initialData, onClose, onSave }) {
      const isEditing = !!initialData;
      const [showAdvanced, setShowAdvanced] = useState(isEditing);
      const [showAvatarHelp, setShowAvatarHelp] = useState(false);
      const [isSaving, setIsSaving] = useState(false);
      const [showCollabDD, setShowCollabDD] = useState(false);
      const [showSocialsDD, setShowSocialsDD] = useState(false);
      const collabRef = useRef(null);
      const socialsRef = useRef(null);

      const socialOptions = ['YouTube','Facebook','TikTok','Threads','小紅書','X (Twitter)','Discord','Twitch','Podcast','其他 (Blog/Website/Link in bio)'];

      const [formData, setFormData] = useState({
        id:null, instagram_url:'', user_id:'', name:'', email:'', followers:'', category:'',
        collaboration_tags:'', promo_platforms:'', avatar_url:'', commission_rate:'', base_fee:'',
        youtube_url:'', facebook_url:'', anytag_url:'', extra_platforms:'',
        other_social_platforms:'', reference_link:'', quote_updated_date:'', notes:''
      });

      useEffect(() => {
        if (initialData) {
          const parsed = parseOtherSocials(initialData.other_social_platforms);
          const safeParsed = typeof parsed === 'object' && parsed !== null ? parsed : {};
          if (initialData.youtube_url && !safeParsed['YouTube']) safeParsed['YouTube'] = initialData.youtube_url;
          if (initialData.facebook_url && !safeParsed['Facebook']) safeParsed['Facebook'] = initialData.facebook_url;
          setFormData({ ...initialData, other_social_platforms: JSON.stringify(safeParsed), user_id: initialData.user_id||'' });
        }
      }, [initialData]);

      const otherSocialsObj = useMemo(() => parseOtherSocials(formData.other_social_platforms), [formData.other_social_platforms]);

      useEffect(() => {
        const hasOther = Object.keys(otherSocialsObj).length > 0;
        setFormData(prev => {
          let nextId = prev.user_id;
          if (!prev.instagram_url && hasOther && !prev.user_id) nextId = 'N/A';
          if (!prev.instagram_url && !hasOther && prev.user_id === 'N/A') nextId = '';
          return prev.user_id === nextId ? prev : { ...prev, user_id: nextId };
        });
      }, [formData.instagram_url, formData.other_social_platforms]);

      useEffect(() => {
        const handleClickOutside = e => {
          if (collabRef.current && !collabRef.current.contains(e.target)) setShowCollabDD(false);
          if (socialsRef.current && !socialsRef.current.contains(e.target)) setShowSocialsDD(false);
        };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      const handleIgChange = (e) => {
        const url = e.target.value;
        const extracted = extractIgUserId(url);
        setFormData(prev => ({ ...prev, instagram_url:url, user_id: url ? (extracted||prev.user_id) : prev.user_id }));
      };

      const handleSocialCheck = (opt, checked) => {
        const obj = {...otherSocialsObj};
        if (checked) obj[opt] = ''; else delete obj[opt];
        setFormData({...formData, other_social_platforms: JSON.stringify(obj)});
      };

      const handleSocialUrl = (opt, url) => {
        const obj = {...otherSocialsObj}; obj[opt] = url;
        setFormData({...formData, other_social_platforms: JSON.stringify(obj)});
      };

      const handleSubmit = async (e) => {
        if (e) e.preventDefault();
        
        const missingFields = [];
        if (!formData.name) missingFields.push('網紅姓名');
        if (!formData.followers) missingFields.push('粉絲數');
        if (!formData.user_id) missingFields.push('帳號 ID');
        if (!formData.collaboration_tags?.trim()) missingFields.push('合作模式 Tags');
        if (!formData.instagram_url?.trim() && Object.keys(otherSocialsObj).length === 0) {
          missingFields.push('社群平台 (請至少填寫 IG 網址或選擇其他平台)');
        }

        if (missingFields.length > 0) {
          alert(`⚠️ 請填寫以下必填欄位：\n\n- ${missingFields.join('\n- ')}`);
          return;
        }

        const allInputUrls = [
          formData.instagram_url,
          ...Object.values(otherSocialsObj)
        ].filter(u => u && u.trim() !== '');

        const invalidUrls = allInputUrls.filter(u => !/^https?:\/\//i.test(u.trim()));
        if (invalidUrls.length > 0) {
          alert('⚠️ 網址格式錯誤：\n\n主力社群平台網址必須包含 "https://" 完整開頭，請檢查後再試一次！');
          return;
        }

        const currentUrls = extractAllUrls({...formData, other_social_platforms: JSON.stringify(otherSocialsObj)});
        if (currentUrls.length > 0) {
          const isDuplicate = existingData.some(d => {
            if (d.id === formData.id) return false; 
            const dUrls = extractAllUrls(d);
            return currentUrls.some(cu => dUrls.includes(cu));
          });

          if (isDuplicate) {
            alert('🚨 警告：您填寫的社群網址已經存在於資料庫中，請勿重複建檔！\n\n💡 系統已自動排除追蹤碼與格式差異進行嚴格比對。');
            return;
          }
        }

        setIsSaving(true);
        try {
          const payload = {...formData};
          payload.followers = parseInt(String(payload.followers).replace(/,/g,''),10) || 0;
          payload.youtube_url = otherSocialsObj['YouTube'] || '';
          payload.facebook_url = otherSocialsObj['Facebook'] || '';
          await onSave(payload, isEditing, initialData?.id);
        } catch (err) {
          console.error("Form Submit Failed:", err);
        } finally { setIsSaving(false); }
      };

      // 🎓 表單填寫專屬的導覽動畫
      const startFormTour = () => {
        if (!window.driver) return alert('載入導覽套件失敗，請稍後重試。');
        const driverObj = window.driver.js.driver({
          showProgress: true,
          nextBtnText: '下一步',
          prevBtnText: '上一步',
          doneBtnText: '完成教學',
          steps: [
            { element: '#tour-form-social', popover: { title: '1. 社群網址', description: 'IG網址與其他平台「擇一」填寫即可。若有填寫 IG，系統會自動幫您抓取帳號 ID。', side: "bottom", align: 'start' }},
            { element: '#tour-form-followers', popover: { title: '2. 粉絲數', description: '請直接輸入純數字，例如「150000」。若有多個平台，請填寫粉絲數最高的那個。', side: "bottom", align: 'start' }},
            { element: '#tour-form-advanced', popover: { title: '3. 進階商業資訊', description: '點擊此區塊可以展開填寫更詳細的保底費用、分潤比率以及開團平台等進階資訊。', side: "top", align: 'start' }},
            { element: '#tour-form-avatar', popover: { title: '4. 大頭貼網址', description: '請貼上圖片的直連網址。如果不知道怎麼抓取，可以點擊旁邊的「教學」按鈕獲取秘技！', side: "top", align: 'start' }},
            { element: '#tour-form-save', popover: { title: '5. 儲存檔案', description: '確認資料都填寫完畢後，點擊這裡就可以建立或更新網紅檔案囉！', side: "top", align: 'end' }}
          ]
        });
        driverObj.drive();
      };

      const bookmarkletCode = `javascript:(function()%7Bvar%20html=document.documentElement.innerHTML;var%20match=html.match(/https:%5C/%5C/storage%5C.googleapis%5C.com%5C/ca-avatar%5C/%5B%5E%22'%5Cs%5C)%5D+/);if(match)%7Bvar%20url=match%5B0%5D.replace(/&quot;/g,%22%22);navigator.clipboard.writeText(url).then(function()%7Balert('%E2%9C%85%20%E6%8A%93%E5%8F%96%E6%88%90%E5%8A%9F%EF%BC%81%E7%B6%B2%E5%9D%80%E5%B7%B2%E8%A4%87%E8%A3%BD%E5%88%B0%E5%89%AA%E8%B2%BC%E7%B0%BF%EF%BC%9A%5Cn%5Cn'+url);%7D).catch(function()%7Bprompt('%E8%AB%8B%E6%89%8B%E5%8B%95%E8%A4%87%E8%A3%BD%EF%BC%9A',url);%7D);%7Delse%7Balert('%E2%9D%8C%20%E6%89%BE%E4%B8%8D%E5%88%B0%E9%A0%AD%E8%B2%BC%E7%B6%B2%E5%9D%80');%7D%7D)();`;

      return (
        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-md z-50 flex items-center justify-center p-4 animate-fade-in">
          <div className="bg-white/95 backdrop-blur-2xl border border-white rounded-3xl w-full max-w-2xl max-h-[90vh] flex flex-col shadow-[0_24px_80px_rgba(0,0,0,0.12)] overflow-hidden animate-zoom-in">
            <div className="sidebar-top-accent" />
            <div className="px-8 py-5 border-b border-slate-100 flex items-center justify-between shrink-0">
              <div className="flex items-center gap-3">
                <h2 className="text-lg font-black grad-brand">{isEditing ? '編輯網紅檔案' : '新增網紅檔案'}</h2>
                {/* 🎓 表單內的教學按鈕 */}
                <button type="button" onClick={startFormTour} className="flex items-center gap-1.5 px-3 py-1.5 bg-brand/10 hover:bg-brand/20 text-brand rounded-full text-xs font-bold transition-colors">
                  <Icon name="help" size={14} /> 填寫教學
                </button>
              </div>
              <button type="button" onClick={onClose} className="p-2 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-full transition-colors"><Icon name="x" size={18} /></button>
            </div>

            <form id="creatorForm" onSubmit={handleSubmit} noValidate className="flex flex-col flex-1 overflow-hidden min-h-0">
              <div className="p-8 overflow-y-auto flex-1 no-scrollbar space-y-8">
                <div className="space-y-5">
                  <div className="flex items-center gap-2 mb-3">
                    <span className="bg-brand/10 text-brand text-xs font-black px-2 py-1 rounded-lg">區塊 A</span><h3 className="font-black text-slate-800">基本資料</h3>
                  </div>
                  
                  {/* 🎯 錨點 1：社群網址 */}
                  <div id="tour-form-social" className="space-y-5">
                    <FormField label="Instagram 網址" hint="💡 與其他社群平台擇一填寫" required colSpan2><input type="text" placeholder="https://instagram.com/..." value={formData.instagram_url} onChange={handleIgChange} className={inputCls} /></FormField>
                    <FormField label="其他社群平台網址" hint="💡 與Instagram網址擇一填寫" required colSpan2>
                      <div ref={socialsRef} className="relative mb-3">
                        <div onClick={() => setShowSocialsDD(!showSocialsDD)} className={`${inputCls} cursor-pointer flex justify-between items-center ${showSocialsDD ? 'ring-2 ring-brand/30 border-brand' : ''}`}>
                          <span className={Object.keys(otherSocialsObj).length > 0 ? "text-slate-800 font-bold truncate pr-2" : "text-slate-400"}>{Object.keys(otherSocialsObj).length > 0 ? Object.keys(otherSocialsObj).join(', ') : '新增 YouTube, TikTok, Threads...'}</span>
                          <span className={`text-slate-400 transition-transform ${showSocialsDD ? 'rotate-180' : ''}`}><Icon name="chevdown" size={18} /></span>
                        </div>
                        {showSocialsDD && (
                          <div className="absolute z-20 mt-1 w-full bg-white border border-slate-100 shadow-[0_10px_40px_rgba(0,0,0,0.1)] rounded-2xl p-3 grid grid-cols-2 sm:grid-cols-3 gap-2 animate-slide-down">
                            {socialOptions.map(opt => {
                              const checked = otherSocialsObj.hasOwnProperty(opt);
                              return (
                                <label key={opt} className={`flex items-center gap-2 text-sm font-bold cursor-pointer p-2.5 rounded-xl transition-all ${checked ? 'bg-brand/10 text-brand' : 'text-slate-600 hover:bg-slate-50'}`}>
                                  <input type="checkbox" checked={checked} onChange={e => handleSocialCheck(opt, e.target.checked)} className="rounded border-slate-300 text-brand focus:ring-brand h-4 w-4 shrink-0" /><span className="truncate">{opt}</span>
                                </label>
                              );
                            })}
                          </div>
                        )}
                      </div>
                      {Object.keys(otherSocialsObj).length > 0 && (
                        <div className="space-y-2.5 p-4 bg-slate-50 border border-slate-100 rounded-2xl mb-3">
                          <div className="text-xs font-bold text-slate-400 mb-2 flex items-center gap-1.5"><Icon name="info" size={14} /> 貼上對應平台網址：</div>
                          {Object.keys(otherSocialsObj).map(opt => (
                            <div key={opt} className="flex items-center gap-3 animate-fade-in"><div className="w-24 shrink-0 text-xs font-bold text-slate-600 text-right">{opt}</div><input type="text" placeholder="https://..." value={otherSocialsObj[opt]} onChange={e => handleSocialUrl(opt, e.target.value)} className={inputCls} /></div>
                          ))}
                        </div>
                      )}
                    </FormField>
                  </div>
                  
                  <FormField label="額外曝光管道" hint="💡 不同管道網址請直接換行貼上" hintStyle="gray" colSpan2><textarea rows="3" placeholder="💡 例：Line社群、FB私密社團、7-11賣貨便等... 請直接換行貼上不同管道的網址或說明" value={formData.extra_platforms||''} onChange={e => setFormData({...formData, extra_platforms:e.target.value})} className={`${inputCls} resize-none leading-relaxed border-dashed`} /></FormField>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <FormField label="網紅姓名" required><input type="text" value={formData.name} onChange={e => setFormData({...formData, name:e.target.value})} className={inputCls} /></FormField>
                    {/* 🎯 錨點 2：粉絲數 */}
                    <div id="tour-form-followers" className="w-full">
                      <FormField label="粉絲數" hint="💡 填寫最高平台數字" required><input type="text" placeholder="例：150000" value={formData.followers} onChange={e => setFormData({...formData, followers:e.target.value})} className={inputCls} /></FormField>
                    </div>
                  </div>
                  <FormField label="Email 聯絡信箱" colSpan2><input type="text" placeholder="hello@example.com" value={formData.email||''} onChange={e => setFormData({...formData, email:e.target.value})} className={inputCls} /></FormField>
                  <FormField label="內容分類 (複選)" colSpan2>
                    <div className="grid grid-cols-2 sm:grid-cols-3 gap-2 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                      {categories.map(cat => {
                        const checked = formData.category?.includes(cat.name) || false;
                        return (
                          <label key={cat.id} className={`flex items-center gap-2 text-sm font-bold cursor-pointer p-2 rounded-xl transition-all ${checked ? 'bg-brand/10 text-brand' : 'text-slate-600 hover:bg-white'}`}>
                            <input type="checkbox" checked={checked} onChange={e => {
                              let cats = formData.category ? formData.category.split(',').map(s=>s.trim()).filter(Boolean) : [];
                              if (e.target.checked) cats.push(cat.name); else cats = cats.filter(c => c !== cat.name);
                              setFormData({...formData, category: cats.join(', ')});
                            }} className="rounded border-slate-300 text-brand focus:ring-brand h-4 w-4" /><span className="truncate">{cat.name}</span>
                          </label>
                        );
                      })}
                    </div>
                  </FormField>

                  <FormField label="合作模式 Tags" required colSpan2>
                    <div ref={collabRef} className="relative">
                      <div onClick={() => setShowCollabDD(!showCollabDD)} className={`${inputCls} cursor-pointer flex justify-between items-center ${showCollabDD ? 'ring-2 ring-brand/30 border-brand' : ''}`}>
                        <span className={formData.collaboration_tags ? "text-slate-800 font-bold truncate pr-2" : "text-slate-400"}>{formData.collaboration_tags||'請選擇合作模式...'}</span>
                        <Icon name={showCollabDD ? 'chevup' : 'chevdown'} size={18} className="text-slate-400 shrink-0" />
                      </div>
                      {showCollabDD && (
                        <div className="absolute z-20 mt-1 w-full bg-white border border-slate-100 shadow-[0_10px_40px_rgba(0,0,0,0.1)] rounded-2xl p-3 grid grid-cols-2 sm:grid-cols-3 gap-2 animate-slide-down">
                          {COLLAB_OPTIONS.map(opt => {
                            const checked = formData.collaboration_tags?.includes(opt) || false;
                            return (
                              <label key={opt} className={`flex items-center gap-2 text-sm font-bold cursor-pointer p-2.5 rounded-xl transition-all ${checked ? 'bg-brand/10 text-brand' : 'text-slate-600 hover:bg-slate-50'}`}>
                                <input type="checkbox" checked={checked} onChange={e => {
                                  let tags = formData.collaboration_tags ? formData.collaboration_tags.split(',').map(s=>s.trim()).filter(Boolean) : [];
                                  if (e.target.checked) tags.push(opt); else tags = tags.filter(c=>c!==opt);
                                  setFormData({...formData, collaboration_tags:tags.join(', ')});
                                }} className="rounded border-slate-300 text-brand focus:ring-brand h-4 w-4 shrink-0" />{opt}
                              </label>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  </FormField>

                  <FormField label="帳號 ID" hint="💡 可手動編輯" required colSpan2><input type="text" placeholder="有填IG會自動帶入，無IG則自動填N/A" value={formData.user_id} onChange={e => setFormData({...formData, user_id:e.target.value})} className={inputCls} /></FormField>
                </div>

                <hr className="border-slate-100" />
                <div>
                  {/* 🎯 錨點 3：進階商業資訊 */}
                  <button id="tour-form-advanced" type="button" onClick={() => setShowAdvanced(!showAdvanced)} className="w-full flex items-center justify-between p-4 bg-slate-50 hover:bg-white border border-slate-100 rounded-2xl transition-all shadow-sm">
                    <div className="flex items-center gap-3"><span className="bg-slate-200 text-slate-600 text-xs font-black px-2 py-1 rounded-lg">區塊 B</span><span className="font-black text-slate-700">進階商業資訊 (選填)</span></div>
                    <Icon name={showAdvanced ? 'chevup' : 'chevdown'} size={18} className="text-slate-400" />
                  </button>

                  {showAdvanced && (
                    <div className="mt-5 grid grid-cols-1 md:grid-cols-2 gap-5 animate-slide-down">
                      <FormField label="固定開團平台" hint="💡 通常在哪裡開團？(複選)" colSpan2>
                        <div className="flex flex-wrap gap-2 pt-1">
                          {PROMO_PLATFORM_OPTIONS.map(plat => {
                            const checked = formData.promo_platforms?.includes(plat) || false;
                            return (
                              <label key={plat} className={`flex items-center gap-1.5 cursor-pointer text-xs font-semibold px-3 py-1.5 rounded-lg border transition-all ${checked ? 'bg-brand/10 border-brand text-brand shadow-sm' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50'}`}>
                                <input type="checkbox" className="hidden" checked={checked} onChange={e => {
                                  let plats = formData.promo_platforms ? formData.promo_platforms.split(',').map(s=>s.trim()).filter(Boolean) : [];
                                  if (e.target.checked) plats.push(plat); else plats = plats.filter(p=>p!==plat);
                                  setFormData({...formData, promo_platforms:plats.join(', ')});
                                }} />{plat}
                              </label>
                            );
                          })}
                        </div>
                      </FormField>

                      <FormField label="預計分潤比率"><input type="text" value={formData.commission_rate||''} onChange={e => setFormData({...formData, commission_rate:e.target.value})} className={inputCls} /></FormField>
                      <FormField label="保底費用"><input type="text" value={formData.base_fee||''} onChange={e => setFormData({...formData, base_fee:e.target.value})} className={inputCls} /></FormField>
                      <FormField label="最新更新時間"><input type="text" placeholder="例：2026.03" value={formData.quote_updated_date||''} onChange={e => setFormData({...formData, quote_updated_date:e.target.value})} className={inputCls} /></FormField>
                      
                      {/* 🎯 錨點 4：大頭貼網址 */}
                      <div id="tour-form-avatar" className="md:col-span-2">
                        <FormField label="大頭貼網址">
                          <div className="flex gap-2">
                            <input type="text" value={formData.avatar_url} onChange={e => setFormData({...formData, avatar_url:e.target.value})} className={`${inputCls} flex-1`} />
                            <button type="button" onClick={() => setShowAvatarHelp(!showAvatarHelp)} className="px-3 py-2 bg-brand/10 text-brand rounded-xl text-xs font-black flex items-center gap-1 hover:bg-brand/20 transition-colors shrink-0"><Icon name="help" size={13} /> 教學</button>
                          </div>
                          {showAvatarHelp && (
                            <div className="mt-3 p-5 bg-slate-900 text-white rounded-2xl shadow-xl border border-slate-700">
                              <h4 className="font-bold text-brand mb-1 flex items-center gap-2">🦊 如何抓取 AnyTag 頭貼URL？</h4><p className="text-xs text-amber-300 font-bold mb-3 ml-6 opacity-90">💡 書籤只需安裝一次，之後可永久使用！</p>
                              <ol className="text-sm space-y-1.5 text-slate-300 ml-5 list-decimal mb-4"><li>隨便把一個不相關的網頁存成瀏覽器書籤。</li><li>編輯該書籤，名稱改為「抓頭貼」，網址替換為下方代碼。</li><li>之後進到 AnyTag 網紅頁面，點擊書籤即可自動複製頭貼 URL！</li></ol>
                              <button type="button" onClick={() => { navigator.clipboard.writeText(bookmarkletCode).then(() => { alert('✅ 已複製！'); setShowAvatarHelp(false); }); }} className="w-full py-2.5 text-white font-bold rounded-xl flex items-center justify-center gap-2 transition-colors" style={{background:'linear-gradient(135deg,#E14f4b,#c75551)'}}><Icon name="copy" size={14} /> 一鍵複製秘技代碼</button>
                            </div>
                          )}
                        </FormField>
                      </div>

                      <FormField label="AnyTag Profile 網址"><input type="text" value={formData.anytag_url||''} onChange={e => setFormData({...formData, anytag_url:e.target.value})} className={inputCls} /></FormField>
                      <FormField label="參考貼文連結"><input type="text" placeholder="https://..." value={formData.reference_link||''} onChange={e => setFormData({...formData, reference_link:e.target.value})} className={inputCls} /></FormField>
                      <FormField label="備註 Notes" colSpan2><textarea rows="3" placeholder="💡 例如：過往業績表現、合作注意事項、特殊禁忌..." value={formData.notes} onChange={e => setFormData({...formData, notes:e.target.value})} className={`${inputCls} resize-none`} /></FormField>
                    </div>
                  )}
                </div>
              </div>

              <div className="px-8 py-5 border-t border-slate-100 flex justify-end gap-3 bg-white/80 shrink-0">
                <button type="button" onClick={onClose} disabled={isSaving} className="px-6 py-3 text-sm font-bold text-slate-600 hover:bg-slate-100 rounded-2xl transition-all disabled:opacity-50">取消</button>
                {/* 🎯 錨點 5：儲存按鈕 */}
                <button id="tour-form-save" type="submit" disabled={isSaving} className="px-8 py-3 text-sm font-black text-white rounded-2xl shadow-glow transition-all hover:-translate-y-0.5 disabled:opacity-50 disabled:translate-y-0 disabled:shadow-none" style={{background:'linear-gradient(135deg,#E14f4b 0%,#f0857f 50%,#c75551 100%)'}}>{isSaving ? '處理中...' : (isEditing ? '儲存變更' : '建立檔案')}</button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    // ============================================================
    // 🗑️ CONFIRM DELETE MODAL
    // ============================================================
    function ConfirmDeleteModal({ data, onClose, onConfirm }) {
      const [isDeleting, setIsDeleting] = useState(false);
      const [errorMsg, setErrorMsg] = useState(null);
      if (!data) return null;

      const handleConfirm = async () => {
        setIsDeleting(true); setErrorMsg(null);
        try { await onConfirm(data); }
        catch (err) { setErrorMsg(err.message || '刪除時發生未知錯誤'); }
        finally { setIsDeleting(false); }
      };

      return (
        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[60] flex items-center justify-center p-4 animate-fade-in">
          <div className="bg-white rounded-[2rem] w-full max-w-sm p-8 shadow-2xl flex flex-col items-center text-center animate-zoom-in border border-slate-100">
            <div className="w-16 h-16 rounded-full bg-red-50 text-red-500 flex items-center justify-center mb-5 border border-red-100"><Icon name="triangle" size={28} stroke="#ef4444" strokeWidth={1.5} /></div>
            <h3 className="text-xl font-black text-slate-800 mb-3">確認刪除？</h3>
            <p className="text-slate-500 text-sm mb-6 leading-relaxed">即將永久刪除 <strong className="text-slate-800 font-black">{data.name}</strong> 的所有資料，此動作無法復原！</p>
            {errorMsg && <div className="w-full mb-5 p-3 bg-red-50 border border-red-200 text-red-600 text-sm font-bold rounded-xl text-left whitespace-pre-wrap break-all">⚠️ {errorMsg}</div>}
            <div className="flex gap-3 w-full">
              <button onClick={onClose} disabled={isDeleting} className="flex-1 py-3.5 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold rounded-2xl transition-colors disabled:opacity-50">保留</button>
              <button onClick={handleConfirm} disabled={isDeleting} className="flex-1 py-3.5 text-white font-black rounded-2xl shadow-[0_4px_15px_rgba(220,38,38,0.3)] transition-all hover:-translate-y-0.5 disabled:opacity-50 disabled:translate-y-0" style={{background:'linear-gradient(135deg,#dc2626,#b91c1c)'}}>{isDeleting ? '刪除中...' : '確認刪除'}</button>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>
</html>
